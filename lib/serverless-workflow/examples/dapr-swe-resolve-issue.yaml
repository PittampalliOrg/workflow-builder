document:
  dsl: "1.0.0"
  namespace: dapr-swe
  name: resolve-issue
  version: "1.0.0"
  title: "Resolve Issue (Dapr SWE Agents)"
  summary: >
    Create a sandbox, plan the implementation, apply changes, review them,
    open a draft PR when appropriate, and post one terminal issue comment.

input:
  schema:
    format: json
    document:
      type: object
      properties:
        provider: { type: string }
        owner: { type: string }
        repo: { type: string }
        issue_number: { type: integer }
        title: { type: string }
        body: { type: string }
        sender: { type: string }
      required: [owner, repo, issue_number, title, body]

use:
  functions:
    daprSweInitialize:
      call: http
      with:
        method: POST
        endpoint:
          uri: http://localhost:3500/v1.0/invoke/dapr-swe/method/dapr-swe/initialize
    daprSwePlan:
      call: http
      with:
        method: POST
        endpoint:
          uri: http://localhost:3500/v1.0/invoke/dapr-swe/method/dapr-swe/plan
    daprSweDevelop:
      call: http
      with:
        method: POST
        endpoint:
          uri: http://localhost:3500/v1.0/invoke/dapr-swe/method/dapr-swe/develop
    daprSweReview:
      call: http
      with:
        method: POST
        endpoint:
          uri: http://localhost:3500/v1.0/invoke/dapr-swe/method/dapr-swe/review
    daprSweCommitPR:
      call: http
      with:
        method: POST
        endpoint:
          uri: http://localhost:3500/v1.0/invoke/dapr-swe/method/dapr-swe/commit-pr
    daprSweNotify:
      call: http
      with:
        method: POST
        endpoint:
          uri: http://localhost:3500/v1.0/invoke/dapr-swe/method/dapr-swe/notify

do:
  - initialize:
      call: daprSweInitialize
      with:
        provider: ${ .input.provider }
        owner: ${ .input.owner }
        repo: ${ .input.repo }
        issue_number: ${ .input.issue_number }
        title: ${ .input.title }
        body: ${ .input.body }
        sender: ${ .input.sender }

  - emitSandboxReady:
      emit:
        event:
          with:
            type: dapr-swe.sandbox.ready
            source: https://workflow-builder.local/events/resolve-issue
            data:
              sandbox_id: ${ .initialize.sandbox_id }

  - createPlan:
      call: daprSwePlan
      with:
        provider: ${ .input.provider }
        sandbox_id: ${ .initialize.sandbox_id }
        working_dir: ${ .initialize.working_dir }
        agents_md: ${ .initialize.agents_md }
        github_token: ${ .initialize.github_token }
        gitea_username: ${ .initialize.gitea_username }
        gitea_password: ${ .initialize.gitea_password }
        owner: ${ .input.owner }
        repo: ${ .input.repo }
        issue_number: ${ .input.issue_number }
        title: ${ .input.title }
        body: ${ .input.body }

  - emitPlanCreated:
      emit:
        event:
          with:
            type: dapr-swe.plan.created
            source: https://workflow-builder.local/events/resolve-issue
            data:
              summary: ${ .createPlan.summary }
              step_count: ${ .createPlan.step_count }

  - implementChanges:
      call: daprSweDevelop
      with:
        provider: ${ .input.provider }
        sandbox_id: ${ .initialize.sandbox_id }
        working_dir: ${ .initialize.working_dir }
        github_token: ${ .initialize.github_token }
        gitea_username: ${ .initialize.gitea_username }
        gitea_password: ${ .initialize.gitea_password }
        owner: ${ .input.owner }
        repo: ${ .input.repo }
        issue_number: ${ .input.issue_number }
        title: ${ .input.title }
        body: ${ .input.body }
        plan: ${ .createPlan.plan }

  - decideAfterDevelop:
      switch:
        - noChanges:
            when: ${ .implementChanges.status == 'no_changes' }
            then: notifyNoChanges
        - changesReady:
            when: ${ .implementChanges.status == 'changes_ready' }
            then: reviewChanges
        - default:
            then: notifyFailure

  - reviewChanges:
      call: daprSweReview
      with:
        provider: ${ .input.provider }
        sandbox_id: ${ .initialize.sandbox_id }
        working_dir: ${ .initialize.working_dir }
        owner: ${ .input.owner }
        repo: ${ .input.repo }
        issue_number: ${ .input.issue_number }
        title: ${ .input.title }
        body: ${ .input.body }
        plan: ${ .createPlan.plan }
      then: emitReviewDone

  - emitReviewDone:
      emit:
        event:
          with:
            type: dapr-swe.review.completed
            source: https://workflow-builder.local/events/resolve-issue
            data:
              approved: ${ .reviewChanges.approved }
              status: ${ .reviewChanges.status }
      then: decideAfterReview

  - decideAfterReview:
      switch:
        - approved:
            when: ${ .reviewChanges.approved == true }
            then: commitAndOpenPR
        - rejected:
            then: notifyReviewRejected

  - commitAndOpenPR:
      call: daprSweCommitPR
      with:
        provider: ${ .input.provider }
        sandbox_id: ${ .initialize.sandbox_id }
        working_dir: ${ .initialize.working_dir }
        github_token: ${ .initialize.github_token }
        gitea_username: ${ .initialize.gitea_username }
        gitea_password: ${ .initialize.gitea_password }
        owner: ${ .input.owner }
        repo: ${ .input.repo }
        issue_number: ${ .input.issue_number }
        title: ${ .input.title }
        plan: ${ .createPlan.plan }
        review: ${ .reviewChanges }
      then: notifyCommitResult

  - notifyNoChanges:
      call: daprSweNotify
      with:
        provider: ${ .input.provider }
        github_token: ${ .initialize.github_token }
        gitea_username: ${ .initialize.gitea_username }
        gitea_password: ${ .initialize.gitea_password }
        owner: ${ .input.owner }
        repo: ${ .input.repo }
        issue_number: ${ .input.issue_number }
        status: no_changes
      then: emitWorkflowCompleted

  - notifyReviewRejected:
      call: daprSweNotify
      with:
        provider: ${ .input.provider }
        github_token: ${ .initialize.github_token }
        gitea_username: ${ .initialize.gitea_username }
        gitea_password: ${ .initialize.gitea_password }
        owner: ${ .input.owner }
        repo: ${ .input.repo }
        issue_number: ${ .input.issue_number }
        status: review_rejected
        review: ${ .reviewChanges }
      then: emitWorkflowCompleted

  - notifyCommitResult:
      call: daprSweNotify
      with:
        provider: ${ .input.provider }
        github_token: ${ .initialize.github_token }
        gitea_username: ${ .initialize.gitea_username }
        gitea_password: ${ .initialize.gitea_password }
        owner: ${ .input.owner }
        repo: ${ .input.repo }
        issue_number: ${ .input.issue_number }
        status: ${ .commitAndOpenPR.status }
        pr_url: ${ .commitAndOpenPR.pr_url }
        review: ${ .reviewChanges }
      then: emitWorkflowCompleted

  - notifyFailure:
      call: daprSweNotify
      with:
        provider: ${ .input.provider }
        github_token: ${ .initialize.github_token }
        gitea_username: ${ .initialize.gitea_username }
        gitea_password: ${ .initialize.gitea_password }
        owner: ${ .input.owner }
        repo: ${ .input.repo }
        issue_number: ${ .input.issue_number }
        status: ${ .implementChanges.status }
        error: ${ .implementChanges.summary }
      then: emitWorkflowCompleted

  - emitWorkflowCompleted:
      emit:
        event:
          with:
            type: dapr-swe.workflow.completed
            source: https://workflow-builder.local/events/resolve-issue
            data:
              status: ${ if .notifyCommitResult.status then .notifyCommitResult.status elif .notifyReviewRejected.status then .notifyReviewRejected.status elif .notifyNoChanges.status then .notifyNoChanges.status else .notifyFailure.status end }
              pr_url: ${ if .notifyCommitResult.pr_url then .notifyCommitResult.pr_url else "" end }

output:
  as:
    pr_url: ${ if .notifyCommitResult.pr_url then .notifyCommitResult.pr_url else "" end }
    status: ${ if .notifyCommitResult.status then .notifyCommitResult.status elif .notifyReviewRejected.status then .notifyReviewRejected.status elif .notifyNoChanges.status then .notifyNoChanges.status else .notifyFailure.status end }
    review_approved: ${ if .reviewChanges.approved then .reviewChanges.approved else false end }
