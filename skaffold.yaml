apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: workflow-builder-root

# Root config: composes one Skaffold module per microservice via `requires:`.
#
# Ryzen-only inner loop (HMR file-sync into Skaffold-owned dev pods):
#   bash scripts/skaffold-dev.sh                            # default: workflow-builder
#   bash scripts/skaffold-dev.sh workflow-orchestrator
#   bash scripts/skaffold-dev.sh workflow-builder workflow-orchestrator function-router
#   bash scripts/skaffold-dev.sh ALL                        # all 6 modules (heavy)
#
# Explicit ryzen canary loop (build + push + commit kustomize pin to stacks repo,
# ryzen local Argo deploys). Normal automated delivery and prod-like previews go
# through the dev cluster's GitHub/Tekton/release-pins/Promoter lane instead.
#   skaffold run -m workflow-builder
#   skaffold build -m workflow-builder                      # build+push only
#
# Modules included:
#   workflow-builder       SvelteKit BFF
#   workflow-orchestrator  Python/FastAPI Dapr workflow engine
#   function-router        Node BFF→backend router (Dapr svc invoke)
#   mcp-gateway            Node hosted MCP endpoint
#   swebench-coordinator   Python SWE-bench evaluator coordinator
#
# Excluded:
#   fn-system              Knative Service (scale-to-0; not a regular Deployment).
#                          Inner-loop file-sync into a transient Knative pod is
#                          impractical; treat fn-system as an external dependency
#                          (Argo-managed). `scripts/sandbox-dev.sh` is the
#                          experimental sandbox-based alternative for Knative-
#                          style workloads.

requires:
  - configs: [workflow-builder]
    path: skaffold/workflow-builder.skaffold.yaml
  - configs: [workflow-orchestrator]
    path: skaffold/workflow-orchestrator.skaffold.yaml
  - configs: [function-router]
    path: skaffold/function-router.skaffold.yaml
  - configs: [mcp-gateway]
    path: skaffold/mcp-gateway.skaffold.yaml
  - configs: [swebench-coordinator]
    path: skaffold/swebench-coordinator.skaffold.yaml
  - configs: [sandbox-execution-api]
    path: skaffold/sandbox-execution-api.skaffold.yaml
  - configs: [cli-agent-py-sandbox]
    path: skaffold/cli-agent-py-sandbox.skaffold.yaml
