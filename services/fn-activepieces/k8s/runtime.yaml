apiVersion: apps/v1
kind: Deployment
metadata:
  name: fn-activepieces
  namespace: workflow-builder
  labels:
    app: fn-activepieces
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fn-activepieces
  template:
    metadata:
      labels:
        app: fn-activepieces
    spec:
      serviceAccountName: workflow-builder
      imagePullSecrets:
        - name: ghcr-pull-credentials
      securityContext:
        fsGroup: 1001
      containers:
        - name: fn-activepieces
          image: gitea.cnoe.localtest.me/giteaadmin/fn-activepieces:git-c6ce6dd
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "8080"
            - name: HOST
              value: "0.0.0.0"
            - name: LOG_LEVEL
              value: info
            - name: OTEL_SERVICE_NAME
              value: fn-activepieces
            - name: WORKFLOW_BUILDER_URL
              value: http://workflow-builder.workflow-builder.svc.cluster.local:3000
          envFrom:
            - configMapRef:
                name: workflow-builder-otel-config
            - secretRef:
                name: workflow-builder-secrets
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1001
---
apiVersion: v1
kind: Service
metadata:
  name: fn-activepieces
  namespace: workflow-builder
  labels:
    app: fn-activepieces
spec:
  selector:
    app: fn-activepieces
  ports:
    - name: http
      port: 80
      targetPort: http
