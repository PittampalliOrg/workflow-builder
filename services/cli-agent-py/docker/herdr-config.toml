# Baked herdr config for cli-agent-py sandbox pods (claude-code-cli / codex-cli /
# agy-cli). Mirrors the user's local home-manager herdr config
# (nixos-config home-modules/terminal/herdr.nix) so the in-cluster web-terminal
# UX matches the local one. Container adaptations (the cluster isn't NixOS):
#   - [terminal].default_shell -> /bin/bash  (no /nix/store paths)
#   - [[keys.command]] dev-tool panes DROPPED — lazygit / btop / htop /
#     lazydocker / herdr-file-picker / clipcat-fzf are not in this image.
#   - [ui.toast].delivery: system -> terminal  (a pod has no OS notification
#     service; the browser web terminal is herdr's "outer terminal").
# Keys verified against `herdr --default-config` (herdr 0.6.8).
onboarding = false

[theme]
name = "terminal"

[terminal]
# Empty would mean $SHELL then /bin/sh; pin the container bash explicitly.
default_shell = "/bin/bash"
shell_mode = "non_login"
new_cwd = "follow"

[keys]
prefix = "backtick"

help = "prefix+?"
settings = "prefix+s"
detach = "prefix+q"
reload_config = "prefix+shift+r"
open_notification_target = "prefix+o"

workspace_picker = "prefix+w"
goto = "prefix+g"
new_workspace = "prefix+shift+n"
new_worktree = "prefix+ctrl+g"
rename_workspace = "prefix+shift+w"
close_workspace = "prefix+alt+d"

new_tab = "prefix+c"
rename_tab = "prefix+shift+t"
previous_tab = "prefix+p"
next_tab = "prefix+n"
switch_tab = "alt+1..9"
close_tab = "prefix+shift+x"

rename_pane = "prefix+shift+p"
edit_scrollback = "prefix+e"
focus_pane_left = "ctrl+h"
focus_pane_down = "ctrl+j"
focus_pane_up = "ctrl+k"
focus_pane_right = "ctrl+l"
cycle_pane_next = "prefix+tab"
cycle_pane_previous = "prefix+shift+tab"
last_pane = "prefix+backspace"
split_vertical = "prefix+v"
split_horizontal = "prefix+minus"
close_pane = "prefix+x"
zoom = "prefix+z"
resize_mode = "prefix+r"
toggle_sidebar = "prefix+b"

navigate_pane_left = "h"
navigate_pane_down = "j"
navigate_pane_up = "k"
navigate_pane_right = "l"

[ui]
agent_panel_scope = "all"
show_agent_labels_on_pane_borders = true
mouse_capture = true
mouse_scroll_lines = 1
prompt_new_tab_name = false
accent = "cyan"

[ui.toast]
delivery = "terminal"
delay_seconds = 1

[ui.sound]
enabled = false

[session]
resume_agents_on_restore = true

[experimental]
pane_history = true
