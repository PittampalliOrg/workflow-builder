version: 1

# --- Sandbox setup configuration (queried once at startup) ---

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /proc
    - /dev/urandom
    - /app
    - /etc
    - /var/log
  read_write:
    - /sandbox
    - /tmp
    - /dev/null

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

# --- Network policies (queried per-CONNECT request) ---
#
# Each named policy maps a set of allowed (binary, endpoint) pairs.
# Binary identity is resolved via /proc/net/tcp inode lookup + /proc/{pid}/exe.
# Ancestors (/proc/{pid}/status PPid walk) and cmdline paths are also matched.
# SHA256 integrity is enforced in Rust via trust-on-first-use, not here.

network_policies:
  claude_code:
    name: claude-code
    endpoints:
      - { host: api.anthropic.com, port: 443, protocol: rest, enforcement: enforce, access: full, tls: terminate }
      # Z.AI GLM Coding Plan gateway — the same claude binary reaches this
      # Anthropic-compatible endpoint for the claude-code-cli-glm runtime
      # (ANTHROPIC_BASE_URL=https://api.z.ai/api/anthropic).
      - { host: api.z.ai, port: 443, protocol: rest, enforcement: enforce, access: full, tls: terminate }
      - { host: statsig.anthropic.com, port: 443 }
      - { host: sentry.io, port: 443 }
      - { host: raw.githubusercontent.com, port: 443 }
      - { host: platform.claude.com, port: 443 }
    binaries:
      - { path: /usr/local/bin/claude }
      - { path: /usr/bin/node }

  github_ssh_over_https:
    name: github-ssh-over-https
    endpoints:
      - host: github.com
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        rules:
          # Git Smart HTTP read-only: allow clone, fetch, pull
          # Discovery (query string is included in path matching)
          - allow:
              method: GET
              path: "/**/info/refs*"
          # Data transfer for reads (all repos)
          - allow:
              method: POST
              path: "/**/git-upload-pack"
          # Data transfer for writes
          # - allow:
          #    method: POST
          #    path: "/**/git-receive-pack"
    binaries:
      - { path: /usr/bin/git }

  nvidia_inference:
    name: nvidia-inference
    endpoints:
      - { host: integrate.api.nvidia.com, port: 443 }
    binaries:
      - { path: /usr/bin/curl }
      - { path: /bin/bash }
      - { path: /usr/local/bin/opencode }

  # --- GitHub REST API (read-only) ---
  github_rest_api:
    name: github-rest-api
    endpoints:
      - host: api.github.com
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        access: read-only
    binaries:
      - { path: /usr/local/bin/claude }
      - { path: /usr/bin/gh }

  # --- GitHub Copilot API ---
  # Endpoints from https://docs.github.com/en/copilot/reference/copilot-allowlist-reference
  copilot:
    name: copilot
    endpoints:
      # Auth and user management
      - { host: github.com, port: 443 }
      - { host: api.github.com, port: 443 }
      # Copilot API (subscription-tier routing)
      - { host: api.githubcopilot.com, port: 443, protocol: rest, enforcement: enforce, access: read-write }
      - { host: api.individual.githubcopilot.com, port: 443, protocol: rest, enforcement: enforce, access: read-write }
      - { host: api.business.githubcopilot.com, port: 443, protocol: rest, enforcement: enforce, access: read-write }
      - { host: api.enterprise.githubcopilot.com, port: 443, protocol: rest, enforcement: enforce, access: read-write }
      # Model proxy
      - { host: copilot-proxy.githubusercontent.com, port: 443, protocol: rest, enforcement: enforce, access: read-write }
      # Telemetry, feature flags, updates
      - { host: origin-tracker.githubusercontent.com, port: 443 }
      - { host: telemetry.enterprise.githubcopilot.com, port: 443 }
      - { host: default.exp-tas.com, port: 443 }
      - { host: release-assets.githubusercontent.com, port: 443 }
    binaries:
      - { path: /usr/bin/copilot }
      - { path: "/usr/lib/node_modules/@github/copilot/node_modules/@github/**/copilot" }

  pypi:
    name: pypi
    endpoints:
      - { host: pypi.org, port: 443 }
      - { host: files.pythonhosted.org, port: 443 }
      # uv python install downloads from python-build-standalone on GitHub
      - { host: github.com, port: 443 }
      - { host: objects.githubusercontent.com, port: 443 }
      # uv resolves python-build-standalone release metadata via the GitHub API
      - { host: api.github.com, port: 443 }
      - { host: downloads.python.org, port: 443 }
    binaries:
      - { path: /sandbox/.venv/bin/python }
      - { path: /sandbox/.venv/bin/python3 }
      - { path: /sandbox/.venv/bin/pip }
      - { path: /app/.venv/bin/python }
      - { path: /app/.venv/bin/python3 }
      - { path: /app/.venv/bin/pip }
      - { path: /usr/local/bin/uv }
      # Managed Python installations from uv python install
      - { path: "/sandbox/.uv/python/**" }

  # npm's request fan-out exposed an OpenShell 0.0.42 relay bug: after an
  # inspected upstream response closed its HTTP/1.1 connection, the relay
  # marked the tunnel reusable and reset npm's next write.
  # Package registries need host/binary enforcement, not credential injection,
  # so keep their TLS end to end after the CONNECT policy check.
  npm:
    name: npm
    endpoints:
      - host: registry.npmjs.org
        port: 443
        tls: skip
        access: full
      - host: registry.yarnpkg.com
        port: 443
        tls: skip
        access: full
    binaries:
      - { path: /usr/bin/node }
      - { path: /usr/local/bin/node }
      - { path: /usr/bin/npm }
      - { path: /usr/local/bin/npm }
      - { path: /usr/bin/npx }
      - { path: /usr/local/bin/npx }
      - { path: /usr/local/bin/yarn }
      - { path: /usr/local/bin/pnpm }
      - { path: /usr/bin/curl }
      - { path: "/sandbox/.nvm/versions/node/**" }
      - { path: "/sandbox/.volta/tools/image/node/**" }
      - { path: /sandbox/node_modules/.bin/npm }

  vscode:
    name: vscode
    endpoints:
      - { host: update.code.visualstudio.com, port: 443 }
      # NOTE: OPA host matching uses exact equality, not glob — list hosts explicitly.
      - { host: az764295.vo.msecnd.net, port: 443 }
      - { host: vscode.download.prss.microsoft.com, port: 443 }
      - { host: marketplace.visualstudio.com, port: 443 }
      - { host: gallerycdn.vsassets.io, port: 443 }
    binaries:
      - { path: /usr/bin/curl }
      - { path: /usr/bin/wget }
      - { path: "/sandbox/.vscode-server/**" }
      - { path: "/sandbox/.vscode-remote-containers/**" }

  cursor:
    name: cursor
    endpoints:
      - { host: cursor.blob.core.windows.net, port: 443 }
      # NOTE: OPA host matching uses exact equality, not glob — list hosts explicitly.
      - { host: api2.cursor.sh, port: 443 }
      - { host: repo.cursor.sh, port: 443 }
      - { host: download.cursor.sh, port: 443 }
      - { host: cursor.download.prss.microsoft.com, port: 443 }
    binaries:
      - { path: /usr/bin/curl }
      - { path: /usr/bin/wget }
      - { path: "/sandbox/.cursor-server/**" }

  opencode:
    name: opencode
    endpoints:
    - host: registry.npmjs.org
      port: 443
      tls: skip
      access: full
    - host: opencode.ai
      port: 443
    - host: integrate.api.nvidia.com
      port: 443
    binaries:
    - path: /usr/lib/node_modules/opencode-ai/bin/.opencode
    - path: /usr/bin/node
    - path: /usr/local/bin/opencode

  codex:
    name: codex
    endpoints:
      - { host: api.openai.com,  port: 443 }
      - { host: auth.openai.com, port: 443 }
      - { host: chatgpt.com,     port: 443 }
    binaries:
      - { path: /usr/bin/codex }
      - { path: /usr/bin/node }
      - { path: "/usr/lib/node_modules/@openai/**" }

  # --- Internal Gitea (workflow-checkpoint pushes) ---
  # PittampalliOrg extension on top of the NVIDIA baseline. `access: full` with
  # no `protocol:` is TCP CONNECT passthrough at the OpenShell gateway proxy
  # — required because git-remote-https speaks CONNECT-style HTTPS tunneling
  # which the L7 inspector refuses with 403. Same pattern as `pypi`.
  #
  # Reachable Tailscale Service VIPs:
  #   - gitea-ryzen.tail286401.ts.net     (workflow-checkpoints repo)
  #   - gitea-hub.tail286401.ts.net       (hub Gitea, for Tekton/CI mirroring)
  #   - gitea-hetzner.tail286401.ts.net   (Hetzner cluster Gitea)
  #
  # Allowed binaries cover both the system git toolchain and curl, which
  # workflow-builder's dapr-agent-py uses to bootstrap the checkpoint remote.
  gitea_internal_git:
    name: gitea-internal-git-readwrite
    endpoints:
      - host: gitea-ryzen.tail286401.ts.net
        port: 443
        access: full
      - host: gitea-hub.tail286401.ts.net
        port: 443
        access: full
      - host: gitea-hetzner.tail286401.ts.net
        port: 443
        access: full
      # checkpoint-git over the tailnet: the proxy SSRF guard blocks cluster-
      # internal addresses even when allowlisted, so pushes CONNECT-tunnel to
      # the HTTPS tailnet VIP (checkpoint-git-tls-terminator) like the retired
      # gitea VIPs did.
      - host: checkpoint-git-dev.tail286401.ts.net
        port: 443
        access: full
    binaries:
      - { path: /usr/bin/git }
      - { path: /usr/lib/git-core/git-remote-https }
      - { path: /usr/lib/git-core/git-remote-http }
      - { path: /usr/bin/curl }
