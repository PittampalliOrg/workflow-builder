worker_processes 1;
pid /tmp/nginx/nginx.pid;
error_log /tmp/nginx/log/error.log warn;

events {
    worker_connections 256;
}

http {
    # Keep nginx state off /var (non-root sandbox user can't write there).
    client_body_temp_path /tmp/nginx/client_body;
    proxy_temp_path       /tmp/nginx/proxy;
    fastcgi_temp_path     /tmp/nginx/fastcgi;
    uwsgi_temp_path       /tmp/nginx/uwsgi;
    scgi_temp_path        /tmp/nginx/scgi;
    access_log off;

    # WebSocket connection upgrade map.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ""      close;
    }

    # CDP rewrite proxy. Chromium 119+ only accepts Host: localhost (or
    # an IP literal) on its /json/* HTTP endpoints as DNS-rebinding
    # protection. Clients hitting us via the k8s Service's DNS name would
    # otherwise get 500. Rewrite Host to localhost before proxying to
    # chromium's 127.0.0.1:9222, and handle both the plain HTTP /json/*
    # endpoints and the WebSocket upgrade for /devtools/*.
    server {
        listen 9223;
        server_name _;

        location / {
            proxy_pass http://127.0.0.1:9222;
            proxy_set_header Host localhost;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
        }
    }
}
