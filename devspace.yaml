# ============================================================================
# Profiles
# ============================================================================
profiles:
  - name: ai-chatbot-dev
    description: >
      AI Chatbot + Workflow Builder UI development.
      Starts: workflow-builder, ai-chatbot, workflow-orchestrator, function-router.
    patches:
      - op: replace
        path: vars.ARGO_APPS.default
        value: "workflow-builder ai-chatbot workflow-orchestrator function-router"
      - op: replace
        path: vars.PRODUCTION_DEPLOYMENTS.default
        value: "workflow-builder ai-chatbot workflow-orchestrator function-router"
      - op: remove
        path: dev.durable-agent
      - op: remove
        path: dev.fn-activepieces
      - op: remove
        path: dev.mcp-gateway

  - name: openshell-inner-loop
    description: >
      Default short inner loop.
      Starts: workflow-builder, workflow-orchestrator, function-router.
    patches:
      - op: replace
        path: vars.ARGO_APPS.default
        value: "workflow-builder workflow-orchestrator function-router"
      - op: replace
        path: vars.PRODUCTION_DEPLOYMENTS.default
        value: "workflow-builder workflow-orchestrator function-router"
      - op: remove
        path: dev.ai-chatbot
      - op: remove
        path: dev.durable-agent
      - op: remove
        path: dev.fn-activepieces
      - op: remove
        path: dev.mcp-gateway

  - name: ui-orchestrator
    description: >
      SvelteKit UI + workflow-orchestrator development loop.
      Starts: workflow-builder, workflow-orchestrator.
    patches:
      - op: replace
        path: vars.ARGO_APPS.default
        value: "workflow-builder workflow-orchestrator"
      - op: replace
        path: vars.PRODUCTION_DEPLOYMENTS.default
        value: "workflow-builder workflow-orchestrator"
      - op: remove
        path: dev.ai-chatbot
      - op: remove
        path: dev.function-router
      - op: remove
        path: dev.durable-agent
      - op: remove
        path: dev.fn-activepieces
      - op: remove
        path: dev.mcp-gateway

  - name: workflow-ui-only
    description: >
      Fastest loop when only the SvelteKit UI and BFF are changing.
      Starts: workflow-builder only.
    patches:
      - op: replace
        path: vars.ARGO_APPS.default
        value: "workflow-builder"
      - op: replace
        path: vars.PRODUCTION_DEPLOYMENTS.default
        value: "workflow-builder"
      - op: remove
        path: dev.ai-chatbot
      - op: remove
        path: dev.workflow-orchestrator
      - op: remove
        path: dev.function-router
      - op: remove
        path: dev.durable-agent
      - op: remove
        path: dev.fn-activepieces
      - op: remove
        path: dev.mcp-gateway

  - name: durable-agent-ui
    description: >
      Fast inner loop for the workflow-builder Svelte app and the TypeScript durable-agent service.
      Starts: workflow-builder, durable-agent.
      Requires durable-agent Deployment in the cluster.
    patches:
      - op: replace
        path: vars.ARGO_APPS.default
        value: "workflow-builder durable-agent"
      - op: replace
        path: vars.PRODUCTION_DEPLOYMENTS.default
        value: "workflow-builder durable-agent"
      - op: remove
        path: dev.ai-chatbot
      - op: remove
        path: dev.workflow-orchestrator
      - op: remove
        path: dev.function-router
      - op: remove
        path: dev.fn-activepieces
      - op: remove
        path: dev.mcp-gateway

  - name: durable-agent-e2e
    description: >
      End-to-end durable agent loop.
      Starts: workflow-builder, workflow-orchestrator, durable-agent.
      Use this when validating the SW 1.0 single-agent execution path in-cluster.
    patches:
      - op: replace
        path: vars.ARGO_APPS.default
        value: "workflow-builder workflow-orchestrator durable-agent"
      - op: replace
        path: vars.PRODUCTION_DEPLOYMENTS.default
        value: "workflow-builder workflow-orchestrator durable-agent"
      - op: remove
        path: dev.ai-chatbot
      - op: remove
        path: dev.function-router
      - op: remove
        path: dev.fn-activepieces
      - op: remove
        path: dev.mcp-gateway

  - name: durable-agent-only
    description: >
      Backward-compatible alias for durable-agent-ui.
      Starts: workflow-builder, durable-agent.
    patches:
      - op: replace
        path: vars.ARGO_APPS.default
        value: "workflow-builder durable-agent"
      - op: replace
        path: vars.PRODUCTION_DEPLOYMENTS.default
        value: "workflow-builder durable-agent"
      - op: remove
        path: dev.ai-chatbot
      - op: remove
        path: dev.workflow-orchestrator
      - op: remove
        path: dev.function-router
      - op: remove
        path: dev.fn-activepieces
      - op: remove
        path: dev.mcp-gateway

  - name: function-stack
    description: >
      Full function execution pipeline for testing action routing.
      Starts: workflow-builder, function-router, fn-activepieces, workflow-orchestrator.
      Knative fn-system is intentionally not part of the DevSpace inner loop.
    patches:
      - op: replace
        path: vars.PRODUCTION_DEPLOYMENTS.default
        value: "workflow-builder workflow-orchestrator function-router fn-activepieces"
      - op: remove
        path: dev.ai-chatbot
      - op: remove
        path: dev.durable-agent
      - op: remove
        path: dev.mcp-gateway

  - name: sw-workflow-dev
    description: >
      CNCF Serverless Workflow 1.0 development loop.
      Starts: workflow-builder (frontend types/nodes/config/store),
              workflow-orchestrator (SW 1.0 interpreter + sw_workflow_v1),
              function-router (call task routing via Dapr service invocation).
      Use this profile when iterating on the SW 1.0 migration: types, compile/decompile,
      visual editor nodes, task config panels, Python interpreter, and the execute API.
    patches:
      - op: replace
        path: vars.ARGO_APPS.default
        value: "workflow-builder workflow-orchestrator function-router"
      - op: replace
        path: vars.PRODUCTION_DEPLOYMENTS.default
        value: "workflow-builder workflow-orchestrator function-router"
      - op: remove
        path: dev.ai-chatbot
      - op: remove
        path: dev.durable-agent
      - op: remove
        path: dev.fn-activepieces
      - op: remove
        path: dev.mcp-gateway

  - name: full-agent-stack
    description: >
      Every active in-repo workflow service.
      Includes the internal durable-agent support service.
    patches:
      - op: replace
        path: vars.ARGO_APPS.default
        value: "workflow-builder ai-chatbot workflow-orchestrator function-router fn-system mcp-gateway durable-agent"
      - op: replace
        path: vars.PRODUCTION_DEPLOYMENTS.default
        value: "workflow-builder ai-chatbot workflow-orchestrator function-router fn-activepieces mcp-gateway durable-agent"
