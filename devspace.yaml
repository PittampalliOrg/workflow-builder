# ============================================================================
# Pipelines — override the default `dev` pipeline to manage ArgoCD
# ============================================================================
pipelines:
  dev:
    run: |
      ARGO_NS="argocd"
      WL_NS="workflow-builder"
      SKIP_ANNOTATION="argocd.argoproj.io/skip-reconcile"
      REFRESH_ANNOTATION="argocd.argoproj.io/refresh"
      WORKFLOW_BUILDER_SERVICE="workflow-builder"
      ORIGINAL_REPLICAS_ANNOTATION="devspace.sh/original-replicas"
      LEGACY_WORKFLOW_BUILDER_REPLICAS_ANNOTATION="devspace.sh/original-workflow-builder-replicas"

      resolve_active_apps() {
        case "${DEVSPACE_PROFILE:-}" in
          workflow-ui-only)
            printf '%s\n' "workflow-builder"
            ;;
          ui-orchestrator)
            printf '%s\n' "workflow-builder workflow-orchestrator"
            ;;
          ai-chatbot-dev)
            printf '%s\n' "workflow-builder ai-chatbot workflow-orchestrator function-router"
            ;;
          function-stack)
            printf '%s\n' "workflow-builder workflow-orchestrator function-router fn-activepieces"
            ;;
          sw-workflow-dev|openshell-inner-loop)
            printf '%s\n' "workflow-builder workflow-orchestrator function-router"
            ;;
          swebench-dev)
            printf '%s\n' "workflow-builder workflow-orchestrator function-router swebench-coordinator dapr-agent-py"
            ;;
          full-agent-stack)
            printf '%s\n' "workflow-builder ai-chatbot workflow-orchestrator function-router fn-activepieces mcp-gateway swebench-coordinator dapr-agent-py"
            ;;
          *)
            printf '%s\n' "${ARGO_APPS}"
            ;;
        esac
      }

      resolve_recovery_deployments() {
        case "${DEVSPACE_PROFILE:-}" in
          workflow-ui-only)
            printf '%s\n' "workflow-builder"
            ;;
          ui-orchestrator)
            printf '%s\n' "workflow-builder workflow-orchestrator"
            ;;
          ai-chatbot-dev)
            printf '%s\n' "workflow-builder ai-chatbot workflow-orchestrator function-router"
            ;;
          function-stack)
            printf '%s\n' "workflow-builder workflow-orchestrator function-router fn-activepieces"
            ;;
          sw-workflow-dev|openshell-inner-loop)
            printf '%s\n' "workflow-builder workflow-orchestrator function-router"
            ;;
          swebench-dev)
            printf '%s\n' "workflow-builder workflow-orchestrator function-router swebench-coordinator dapr-agent-py"
            ;;
          full-agent-stack)
            printf '%s\n' "workflow-builder ai-chatbot workflow-orchestrator function-router fn-activepieces mcp-gateway swebench-coordinator dapr-agent-py"
            ;;
          *)
            printf '%s\n' "${PRODUCTION_DEPLOYMENTS}"
            ;;
        esac
      }

      ACTIVE_APPS="$(resolve_active_apps)"
      RECOVERY_DEPLOYMENTS="$(resolve_recovery_deployments)"

      route_workflow_builder_service_to_dev() {
        kubectl patch service "$WORKFLOW_BUILDER_SERVICE" \
          --namespace "$WL_NS" \
          --type=merge \
          -p='{"spec":{"selector":{"app":"workflow-builder","traffic":"prod","devspace.sh/replaced":"true"}}}' \
          >/dev/null 2>&1 || true
      }

      restore_workflow_builder_service_to_prod() {
        kubectl patch service "$WORKFLOW_BUILDER_SERVICE" \
          --namespace "$WL_NS" \
          --type=merge \
          -p='{"spec":{"selector":{"app":"workflow-builder","traffic":"prod","devspace.sh/replaced":"false"}}}' \
          >/dev/null 2>&1 || true
      }

      capture_deployment_replicas() {
        dep="$1"
        if ! kubectl get deployment "$dep" --namespace "$WL_NS" >/dev/null 2>&1; then
          return
        fi
        replicas="$(kubectl get deployment "$dep" --namespace "$WL_NS" -o jsonpath='{.spec.replicas}' 2>/dev/null)"
        if [ -z "${replicas}" ]; then
          replicas="1"
        fi
        kubectl annotate deployment "$dep" \
          --namespace "$WL_NS" \
          "${ORIGINAL_REPLICAS_ANNOTATION}=${replicas}" \
          --overwrite >/dev/null 2>&1 || true
      }

      scale_production_deployments_to_dev() {
        for dep in ${RECOVERY_DEPLOYMENTS}; do
          capture_deployment_replicas "$dep"
          kubectl scale deployment "$dep" \
            --namespace "$WL_NS" \
            --replicas=0 >/dev/null 2>&1 || true
        done
      }

      restore_production_deployment_replicas() {
        for dep in ${RECOVERY_DEPLOYMENTS}; do
          if ! kubectl get deployment "$dep" --namespace "$WL_NS" >/dev/null 2>&1; then
            continue
          fi
          replicas="$(kubectl get deployment "$dep" --namespace "$WL_NS" -o jsonpath="{.metadata.annotations.${ORIGINAL_REPLICAS_ANNOTATION//\//\\.}}" 2>/dev/null)"
          if [ -z "${replicas}" ] && [ "$dep" = "$WORKFLOW_BUILDER_SERVICE" ]; then
            replicas="$(kubectl get deployment "$dep" --namespace "$WL_NS" -o jsonpath="{.metadata.annotations.${LEGACY_WORKFLOW_BUILDER_REPLICAS_ANNOTATION//\//\\.}}" 2>/dev/null)"
          fi
          if [ -z "${replicas}" ]; then
            replicas="1"
          fi
          kubectl scale deployment "$dep" \
            --namespace "$WL_NS" \
            --replicas="${replicas}" >/dev/null 2>&1 || true
          kubectl annotate deployment "$dep" \
            --namespace "$WL_NS" \
            "${ORIGINAL_REPLICAS_ANNOTATION}-" >/dev/null 2>&1 || true
          kubectl annotate deployment "$dep" \
            --namespace "$WL_NS" \
            "${LEGACY_WORKFLOW_BUILDER_REPLICAS_ANNOTATION}-" >/dev/null 2>&1 || true
        done
      }

      delete_devspace_state_for_active_apps() {
        for app in ${ACTIVE_APPS}; do
          kubectl delete deployment \
            --namespace "$WL_NS" \
            -l "app=${app},devspace.sh/replaced=true" \
            --ignore-not-found \
            --wait=true >/dev/null 2>&1 || true
          kubectl delete replicaset \
            --namespace "$WL_NS" \
            -l "app=${app},devspace.sh/replaced=true" \
            --ignore-not-found >/dev/null 2>&1 || true
          kubectl delete pod \
            --namespace "$WL_NS" \
            -l "app=${app},devspace.sh/replaced=true" \
            --ignore-not-found >/dev/null 2>&1 || true
        done
        for _ in $(seq 1 15); do
          remaining=""
          for app in ${ACTIVE_APPS}; do
            app_remaining="$(kubectl get deployment \
              --namespace "$WL_NS" \
              -l "app=${app},devspace.sh/replaced=true" \
              -o name 2>/dev/null || true)"
            remaining="${remaining}${app_remaining}"
          done
          [ -z "${remaining}" ] && break
          sleep 1
        done
      }

      # ── Pause ArgoCD for active apps ──
      for app in ${ACTIVE_APPS}; do
        if kubectl get application "$app" --namespace "$ARGO_NS" >/dev/null 2>&1; then
          echo "==> Pausing ArgoCD reconciliation for $app"
          kubectl annotate application "$app" \
            --namespace "$ARGO_NS" \
            "${SKIP_ANNOTATION}=true" \
            --overwrite >/dev/null 2>&1 || true
        fi
      done
      sleep 3

      # ── Cleanup on exit (Ctrl+C, error, or clean exit) ──
      cleanup() {
        echo ""
        echo "==> Restoring workflow-builder service selector"
        restore_workflow_builder_service_to_prod
        echo "==> Restoring production deployment replicas"
        restore_production_deployment_replicas
        echo "==> Removing DevSpace replacement resources"
        delete_devspace_state_for_active_apps
        echo "==> Resuming ArgoCD reconciliation"
        for app in ${ACTIVE_APPS}; do
          kubectl annotate application "$app" \
            --namespace "$ARGO_NS" \
            "${SKIP_ANNOTATION}-" >/dev/null 2>&1 || true
          kubectl annotate application "$app" \
            --namespace "$ARGO_NS" \
            "${REFRESH_ANNOTATION}=hard" \
            --overwrite >/dev/null 2>&1 || true
        done
        echo "==> Waiting for production deployments to recover"
        for dep in ${RECOVERY_DEPLOYMENTS}; do
          kubectl rollout status \
            --namespace "$WL_NS" \
            "deployment/${dep}" \
            --timeout=180s >/dev/null 2>&1 || true
        done
      }
      trap cleanup EXIT

      # ── Standard DevSpace dev pipeline ──
      run_dependencies --all
      ensure_pull_secrets --all
      build_images --all
      create_deployments --all
      echo "==> Routing workflow-builder service to the DevSpace replacement pod"
      route_workflow_builder_service_to_dev
      echo "==> Scaling down Argo-managed production deployments"
      scale_production_deployments_to_dev
      start_dev --all
      echo "==> Dev session active. Press Ctrl+C to restore production routing."
      while true; do
        sleep 3600
      done

  deploy-ui:
    run: |
      run_command deploy-ui

# ============================================================================
# Hooks — safety net for `devspace purge`
# ============================================================================
hooks:
  - name: resume-argocd-after-purge
    events:
      - after:purge
    command: sh
    args:
      - -c
      - |
        ARGO_NS="argocd"
        WL_NS="workflow-builder"
        SKIP="argocd.argoproj.io/skip-reconcile"
        REFRESH="argocd.argoproj.io/refresh"
        WORKFLOW_BUILDER_SERVICE="workflow-builder"
        ORIGINAL_REPLICAS_ANNOTATION="devspace.sh/original-replicas"
        LEGACY_WORKFLOW_BUILDER_REPLICAS_ANNOTATION="devspace.sh/original-workflow-builder-replicas"
        case "${DEVSPACE_PROFILE:-}" in
          workflow-ui-only) ACTIVE_APPS="workflow-builder" ;;
          ui-orchestrator) ACTIVE_APPS="workflow-builder workflow-orchestrator" ;;
          ai-chatbot-dev) ACTIVE_APPS="workflow-builder ai-chatbot workflow-orchestrator function-router" ;;
          function-stack) ACTIVE_APPS="workflow-builder workflow-orchestrator function-router fn-activepieces" ;;
          sw-workflow-dev|openshell-inner-loop) ACTIVE_APPS="workflow-builder workflow-orchestrator function-router" ;;
          swebench-dev) ACTIVE_APPS="workflow-builder workflow-orchestrator function-router swebench-coordinator dapr-agent-py" ;;
          full-agent-stack) ACTIVE_APPS="workflow-builder ai-chatbot workflow-orchestrator function-router fn-activepieces mcp-gateway swebench-coordinator dapr-agent-py" ;;
          *) ACTIVE_APPS="${ARGO_APPS}" ;;
        esac
        for app in ${ACTIVE_APPS}; do
          kubectl annotate application "$app" --namespace "$ARGO_NS" "${SKIP}-" 2>/dev/null || true
          kubectl annotate application "$app" --namespace "$ARGO_NS" "${REFRESH}=hard" --overwrite 2>/dev/null || true
        done
        for app in ${ACTIVE_APPS}; do
          if ! kubectl get deployment "$app" --namespace "$WL_NS" >/dev/null 2>&1; then
            continue
          fi
          replicas="$(kubectl get deployment "$app" --namespace "$WL_NS" -o jsonpath="{.metadata.annotations.${ORIGINAL_REPLICAS_ANNOTATION//\//\\.}}" 2>/dev/null)"
          if [ -z "${replicas}" ] && [ "$app" = "$WORKFLOW_BUILDER_SERVICE" ]; then
            replicas="$(kubectl get deployment "$app" --namespace "$WL_NS" -o jsonpath="{.metadata.annotations.${LEGACY_WORKFLOW_BUILDER_REPLICAS_ANNOTATION//\//\\.}}" 2>/dev/null)"
          fi
          if [ -z "${replicas}" ]; then
            replicas="1"
          fi
          kubectl scale deployment "$app" --namespace "$WL_NS" --replicas="${replicas}" >/dev/null 2>&1 || true
          kubectl annotate deployment "$app" --namespace "$WL_NS" "${ORIGINAL_REPLICAS_ANNOTATION}-" >/dev/null 2>&1 || true
          kubectl annotate deployment "$app" --namespace "$WL_NS" "${LEGACY_WORKFLOW_BUILDER_REPLICAS_ANNOTATION}-" >/dev/null 2>&1 || true
        done
        kubectl patch service workflow-builder \
          --namespace workflow-builder \
          --type=merge \
          -p='{"spec":{"selector":{"app":"workflow-builder","traffic":"prod","devspace.sh/replaced":"false"}}}' \
          >/dev/null 2>&1 || true
        for app in ${ACTIVE_APPS}; do
          kubectl delete deployment \
            --namespace workflow-builder \
            -l "app=${app},devspace.sh/replaced=true" \
            --ignore-not-found \
            --wait=true >/dev/null 2>&1 || true
          kubectl delete replicaset \
            --namespace workflow-builder \
            -l "app=${app},devspace.sh/replaced=true" \
            --ignore-not-found >/dev/null 2>&1 || true
          kubectl delete pod \
            --namespace workflow-builder \
            -l "app=${app},devspace.sh/replaced=true" \
            --ignore-not-found >/dev/null 2>&1 || true
        done

# ============================================================================
# Commands — manual ArgoCD pause/resume
# ============================================================================
commands:
  argocd-pause: |-
    case "${DEVSPACE_PROFILE:-}" in
      workflow-ui-only) ACTIVE_APPS="workflow-builder" ;;
      ui-orchestrator) ACTIVE_APPS="workflow-builder workflow-orchestrator" ;;
      ai-chatbot-dev) ACTIVE_APPS="workflow-builder ai-chatbot workflow-orchestrator function-router" ;;
      function-stack) ACTIVE_APPS="workflow-builder workflow-orchestrator function-router fn-activepieces" ;;
      sw-workflow-dev|openshell-inner-loop) ACTIVE_APPS="workflow-builder workflow-orchestrator function-router" ;;
      swebench-dev) ACTIVE_APPS="workflow-builder workflow-orchestrator function-router swebench-coordinator dapr-agent-py" ;;
      full-agent-stack) ACTIVE_APPS="workflow-builder ai-chatbot workflow-orchestrator function-router fn-activepieces mcp-gateway swebench-coordinator dapr-agent-py" ;;
      *) ACTIVE_APPS="${ARGO_APPS}" ;;
    esac
    for app in ${ACTIVE_APPS}; do
      kubectl annotate application "$app" --namespace argocd \
        "argocd.argoproj.io/skip-reconcile=true" --overwrite 2>/dev/null || true
    done
  argocd-resume: |-
    case "${DEVSPACE_PROFILE:-}" in
      workflow-ui-only) ACTIVE_APPS="workflow-builder" ;;
      ui-orchestrator) ACTIVE_APPS="workflow-builder workflow-orchestrator" ;;
      ai-chatbot-dev) ACTIVE_APPS="workflow-builder ai-chatbot workflow-orchestrator function-router" ;;
      function-stack) ACTIVE_APPS="workflow-builder workflow-orchestrator function-router fn-activepieces" ;;
      sw-workflow-dev|openshell-inner-loop) ACTIVE_APPS="workflow-builder workflow-orchestrator function-router" ;;
      swebench-dev) ACTIVE_APPS="workflow-builder workflow-orchestrator function-router swebench-coordinator dapr-agent-py" ;;
      full-agent-stack) ACTIVE_APPS="workflow-builder ai-chatbot workflow-orchestrator function-router fn-activepieces mcp-gateway swebench-coordinator dapr-agent-py" ;;
      *) ACTIVE_APPS="${ARGO_APPS}" ;;
    esac
    for app in ${ACTIVE_APPS}; do
      kubectl annotate application "$app" --namespace argocd \
        "argocd.argoproj.io/skip-reconcile-" 2>/dev/null || true
      kubectl annotate application "$app" --namespace argocd \
        "argocd.argoproj.io/refresh=hard" --overwrite 2>/dev/null || true
    done
  deploy-ui: |-
    echo "==> Building and deploying SvelteKit app (workflow-builder)"
    echo "    Use 'devspace run restart-ui' to skip the build and just restart."
    echo ""
    WL_NS="workflow-builder"
    REPO="${CURRENT_IMAGE_REPOSITORY}"
    TAG="deploy-$(date +%s)"
    IMAGE="${REPO}:${TAG}"
    echo "Step 1: Pause ArgoCD"
    kubectl annotate application workflow-builder --namespace argocd \
      "argocd.argoproj.io/skip-reconcile=true" --overwrite 2>/dev/null || true
    echo "Step 2: Build image (${IMAGE})"
    docker build -t "${IMAGE}" -t "${REPO}:latest" -f Dockerfile .
    echo "Step 3: Load into Kind cluster"
    kind load docker-image "${IMAGE}" --name "$(kubectl config current-context | sed 's/kind-//')" 2>/dev/null || \
      docker push "${IMAGE}"
    echo "Step 4: Update deployment"
    kubectl set image deployment/workflow-builder \
      workflow-builder="${IMAGE}" --namespace "$WL_NS"
    echo "Step 5: Wait for rollout"
    kubectl rollout status deployment/workflow-builder \
      --namespace "$WL_NS" --timeout=180s
    echo "Step 6: Resume ArgoCD"
    kubectl annotate application workflow-builder --namespace argocd \
      "argocd.argoproj.io/skip-reconcile-" 2>/dev/null || true
    kubectl annotate application workflow-builder --namespace argocd \
      "argocd.argoproj.io/refresh=hard" --overwrite 2>/dev/null || true
    echo "==> Done: ${IMAGE}"
  restart-ui: |-
    echo "==> Restarting SvelteKit deployment (no build)"
    WL_NS="workflow-builder"
    kubectl annotate application workflow-builder --namespace argocd \
      "argocd.argoproj.io/skip-reconcile=true" --overwrite 2>/dev/null || true
    kubectl rollout restart deployment/workflow-builder --namespace "$WL_NS"
    kubectl rollout status deployment/workflow-builder \
      --namespace "$WL_NS" --timeout=180s
    kubectl annotate application workflow-builder --namespace argocd \
      "argocd.argoproj.io/skip-reconcile-" 2>/dev/null || true
    kubectl annotate application workflow-builder --namespace argocd \
      "argocd.argoproj.io/refresh=hard" --overwrite 2>/dev/null || true
    echo "==> Done."
  build-swebench-evaluator-dev-image: |-
    echo "==> Building SWE-bench evaluator dev image"
    IMAGE="${SWEBENCH_EVALUATOR_DEV_IMAGE}"
    if [ -z "${IMAGE}" ]; then
      echo "SWEBENCH_EVALUATOR_DEV_IMAGE is empty" >&2
      exit 1
    fi
    echo "    image: ${IMAGE}"
    docker build -t "${IMAGE}" -f services/swebench-evaluator/Dockerfile services/swebench-evaluator
    context="$(kubectl config current-context 2>/dev/null || true)"
    case "${context}" in
      kind-*)
        cluster="${context#kind-}"
        echo "==> Loading image into kind cluster ${cluster}"
        kind load docker-image "${IMAGE}" --name "${cluster}" || docker push "${IMAGE}"
        ;;
      *)
        echo "==> Pushing image for non-kind cluster context ${context:-unknown}"
        docker push "${IMAGE}"
        ;;
    esac
    echo "==> Done: ${IMAGE}"
    echo "    Use with: devspace dev --profile swebench-dev --var=SWEBENCH_EVALUATOR_IMAGE=${IMAGE}"
  build-python-devspace-image: |-
    echo "==> Building Python 3.12 DevSpace image"
    PRIMARY_IMAGE="${ORCHESTRATOR_DEV_IMAGE_REPOSITORY}:latest"
    if [ -z "${ORCHESTRATOR_DEV_IMAGE_REPOSITORY}" ]; then
      echo "ORCHESTRATOR_DEV_IMAGE_REPOSITORY is empty" >&2
      exit 1
    fi
    IMAGES="${PRIMARY_IMAGE}"
    for repository in "${SWEBENCH_COORDINATOR_DEV_IMAGE_REPOSITORY}" "${DAPR_AGENT_PY_DEV_IMAGE_REPOSITORY}"; do
      if [ -n "${repository}" ]; then
        image="${repository}:latest"
        case " ${IMAGES} " in
          *" ${image} "*) ;;
          *) IMAGES="${IMAGES} ${image}" ;;
        esac
      fi
    done
    BUILD_TAG_ARGS=""
    for image in ${IMAGES}; do
      echo "    image: ${image}"
      BUILD_TAG_ARGS="${BUILD_TAG_ARGS} -t ${image}"
    done
    docker build ${BUILD_TAG_ARGS} -f Dockerfile.devspace.python .
    echo "==> Pushing image to registry"
    for image in ${IMAGES}; do
      docker push "${image}"
    done
    echo "==> Done: ${IMAGES}"
  build-dev-base-images: |-
    echo "==> Triggering Tekton base-image builds for workflow-builder and dapr-agent-py"
    GIT_SHA="${GIT_SHA:-$(git ls-remote https://gitea-ryzen.tail286401.ts.net/giteaadmin/workflow-builder.git HEAD | awk '{print $1}')}"
    if [ -z "${GIT_SHA}" ]; then
      echo "Could not resolve git SHA from Gitea mirror" >&2
      exit 1
    fi
    echo "    git sha: ${GIT_SHA}"
    kubectl create -f - <<EOF
    apiVersion: tekton.dev/v1
    kind: PipelineRun
    metadata:
      generateName: devspace-workflow-builder-dev-image-
      namespace: workflow-builder-builds
    spec:
      timeouts:
        pipeline: 2h0m0s
      taskRunTemplate:
        serviceAccountName: workflow-builder-build-trigger
      pipelineSpec:
        params:
          - name: git_url
            type: string
          - name: git_sha
            type: string
        workspaces:
          - name: buildah-cache
        tasks:
          - name: build-and-push
            retries: 1
            taskRef:
              name: workflow-builder-image-build-push
            workspaces:
              - name: buildah-cache
                workspace: buildah-cache
            params:
              - name: git_url
                value: \$(params.git_url)
              - name: git_revision
                value: \$(params.git_sha)
              - name: context_dir
                value: .
              - name: dockerfile
                value: Dockerfile
              - name: image
                value: gitea-ryzen.tail286401.ts.net/giteaadmin/workflow-builder:git-\$(params.git_sha)
      params:
        - name: git_url
          value: https://gitea-ryzen.tail286401.ts.net/giteaadmin/workflow-builder.git
        - name: git_sha
          value: ${GIT_SHA}
      workspaces:
        - name: buildah-cache
          persistentVolumeClaim:
            claimName: buildah-cache-workflow-builder
    ---
    apiVersion: tekton.dev/v1
    kind: PipelineRun
    metadata:
      generateName: devspace-claude-code-agent-dev-image-
      namespace: workflow-builder-builds
    spec:
      timeouts:
        pipeline: 2h0m0s
      taskRunTemplate:
        serviceAccountName: workflow-builder-build-trigger
      pipelineSpec:
        params:
          - name: git_url
            type: string
          - name: git_sha
            type: string
        workspaces:
          - name: buildah-cache
        tasks:
          - name: build-and-push
            retries: 1
            taskRef:
              name: workflow-builder-image-build-push
            workspaces:
              - name: buildah-cache
                workspace: buildah-cache
            params:
              - name: git_url
                value: \$(params.git_url)
              - name: git_revision
                value: \$(params.git_sha)
              - name: context_dir
                value: .
              - name: dockerfile
                value: Dockerfile
              - name: image
                value: gitea-ryzen.tail286401.ts.net/giteaadmin/claude-code-agent:git-\$(params.git_sha)
      params:
        - name: git_url
          value: https://gitea-ryzen.tail286401.ts.net/giteaadmin/claude-code-src.git
        - name: git_sha
          value: ${GIT_SHA}
      workspaces:
        - name: buildah-cache
          persistentVolumeClaim:
            claimName: buildah-cache-workflow-builder
    EOF
    echo "==> PipelineRuns created in namespace workflow-builder-builds"
    echo "    Watch with: kubectl get pipelineruns -n workflow-builder-builds -w"

# ============================================================================
# Profiles
# ============================================================================
profiles:
  - name: ai-chatbot-dev
    description: >
      AI Chatbot + Workflow Builder UI development.
      Starts: workflow-builder, ai-chatbot, workflow-orchestrator, function-router.
    patches:
      - op: replace
        path: vars.ARGO_APPS.default
        value: "workflow-builder ai-chatbot workflow-orchestrator function-router"
      - op: replace
        path: vars.PRODUCTION_DEPLOYMENTS.default
        value: "workflow-builder ai-chatbot workflow-orchestrator function-router"
      - op: remove
        path: dev.fn-activepieces
      - op: remove
        path: dev.mcp-gateway
      - op: remove
        path: dev.swebench-coordinator
      - op: remove
        path: dev.dapr-agent-py

  - name: openshell-inner-loop
    description: >
      Default short inner loop.
      Starts: workflow-builder, workflow-orchestrator, function-router.
    patches:
      - op: replace
        path: vars.ARGO_APPS.default
        value: "workflow-builder workflow-orchestrator function-router"
      - op: replace
        path: vars.PRODUCTION_DEPLOYMENTS.default
        value: "workflow-builder workflow-orchestrator function-router"
      - op: remove
        path: dev.ai-chatbot
      - op: remove
        path: dev.fn-activepieces
