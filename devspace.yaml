  AI_CHATBOT_LOCAL_PORT: "3003"
  AI_CHATBOT_CONTAINER_PORT: "3000"
  AI_CHATBOT_SOURCE_PATH: "../../ai/main"
  AI_CHATBOT_PUBLIC_URL:
    default: "https://ai-chatbot-ryzen.tail286401.ts.net"
  MS_AGENT_APP_NAME: ms-agent-workflow
  MS_AGENT_LOCAL_PORT: "3011"
  MS_AGENT_CONTAINER_PORT: "8081"
  DAPR_AGENT_APP_NAME: dapr-agent-runtime
  DAPR_AGENT_LOCAL_PORT: "3012"
  DAPR_AGENT_CONTAINER_PORT: "8082"
  ORCHESTRATOR_APP_NAME: workflow-orchestrator
  ORCHESTRATOR_LOCAL_PORT: "3013"
  ORCHESTRATOR_CONTAINER_PORT: "8080"
  FUNCTION_ROUTER_APP_NAME: function-router
  FUNCTION_ROUTER_LOCAL_PORT: "3014"
  FUNCTION_ROUTER_CONTAINER_PORT: "8080"
  DURABLE_AGENT_APP_NAME: durable-agent
  DURABLE_AGENT_LOCAL_PORT: "3015"
  DURABLE_AGENT_CONTAINER_PORT: "8001"
  FN_ACTIVEPIECES_APP_NAME: fn-activepieces
  FN_ACTIVEPIECES_LOCAL_PORT: "3016"
  FN_ACTIVEPIECES_CONTAINER_PORT: "8080"
  FN_SYSTEM_APP_NAME: fn-system
  FN_SYSTEM_LOCAL_PORT: "3017"
  FN_SYSTEM_CONTAINER_PORT: "8080"
  MCP_GATEWAY_APP_NAME: mcp-gateway
  MCP_GATEWAY_LOCAL_PORT: "3018"
  MCP_GATEWAY_CONTAINER_PORT: "8080"
  OPENSHELL_AGENT_RUNTIME_API_BASE_URL: "http://openshell-agent-runtime.openshell.svc.cluster.local:8083"

  # Registry configuration
  GITEA_HOST:
    default: "gitea.cnoe.localtest.me"
  GITEA_USER:
    default: "giteaadmin"

  # kind-ryzen ingress / auth callback URL
  APP_PUBLIC_URL:
    default: "https://workflow-builder-ryzen.tail286401.ts.net"

  # Resource configuration
  CPU_REQUEST:
    default: "500m"
  CPU_LIMIT:
    default: "4"
  MEMORY_REQUEST:
    default: "2Gi"
  MEMORY_LIMIT:
    default: "8Gi"

  # Observability
  OTEL_SERVICE_NAME:
    default: "${APP_NAME}-dev"
  OTEL_ENVIRONMENT:
    default: "development"

  # Next.js / pnpm configuration
  PNPM_VERSION:
    default: "9.12.3"

  # Database migrations
  RUN_MIGRATIONS:
    # Migrations are executed via GitOps (ArgoCD hook job) in this stack.
    default: "false"
  MIGRATION_COMMAND:
    default: "pnpm db:migrate"

  # Query currently deployed image tag from Kubernetes
  CURRENT_IMAGE_TAG:
    command: |
      kubectl get deployment ${APP_NAME} -n ${APP_NAME} -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null |
      sed 's/.*://' || echo "latest"
    default: "latest"

  CURRENT_PRODUCTION_IMAGE:
    command: |
      kubectl get deployment ${APP_NAME} -n ${APP_NAME} -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null ||
      echo "${GITEA_HOST}/${GITEA_USER}/${APP_NAME}:latest"
    default: "${GITEA_HOST}/${GITEA_USER}/${APP_NAME}:latest"

  CURRENT_IMAGE_REPOSITORY:
    command: |
      image="$(kubectl get deployment ${APP_NAME} -n ${APP_NAME} -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "${GITEA_HOST}/${GITEA_USER}/${APP_NAME}:latest")"
      printf '%s\n' "${image}" | sed 's#:[^/:]*$##'
    default: "${GITEA_HOST}/${GITEA_USER}/${APP_NAME}"

  DEV_IMAGE_REPOSITORY:
    command: |
      image="$(kubectl get deployment ${APP_NAME} -n ${APP_NAME} -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "${GITEA_HOST}/${GITEA_USER}/${APP_NAME}:latest")"
