    patches:
      - op: remove
        path: spec.containers.name=${MCP_GATEWAY_APP_NAME}.livenessProbe
      - op: remove
        path: spec.containers.name=${MCP_GATEWAY_APP_NAME}.readinessProbe
      - op: replace
        path: spec.containers.name=${MCP_GATEWAY_APP_NAME}.securityContext
        value:
          runAsUser: 0
          runAsGroup: 0
          runAsNonRoot: false
          allowPrivilegeEscalation: false
      - op: replace
        path: spec.securityContext
        value:
          fsGroup: 1001
          runAsNonRoot: false
    ports:
      - port: "${MCP_GATEWAY_LOCAL_PORT}:${MCP_GATEWAY_CONTAINER_PORT}"
    # HOST, OTEL, WORKFLOW_BUILDER_URL, MCP_WAIT_TIMEOUT_MS, and secrets
    # all set in stacks/ Deployment. Only override NODE_ENV.
    env:
      - name: NODE_ENV
        value: development

profiles:
  - name: openshell-inner-loop
    description: >
      Default short inner loop for durable workflow authoring and review.
      Starts: workflow-builder, workflow-orchestrator, function-router.
      durable-agent excluded (no Deployment in cluster yet — runs as an external service).
    patches:
      - op: remove
        path: dev.ai-chatbot
      - op: remove
        path: dev.ms-agent-workflow
      - op: remove
        path: dev.dapr-agent-runtime
      - op: remove
        path: dev.durable-agent
      - op: remove
        path: dev.fn-activepieces
      - op: remove
        path: dev.fn-system
      - op: remove
        path: dev.mcp-gateway

  - name: workflow-ui-only
    description: >
      Fastest loop when only the Next.js UI and BFF are changing.
      Starts: workflow-builder only.
    patches:
      - op: remove
        path: dev.ai-chatbot
      - op: remove
        path: dev.ms-agent-workflow
      - op: remove
        path: dev.dapr-agent-runtime
      - op: remove
        path: dev.workflow-orchestrator
      - op: remove
        path: dev.function-router
      - op: remove
        path: dev.durable-agent
      - op: remove
        path: dev.fn-activepieces
      - op: remove
        path: dev.fn-system
      - op: remove
        path: dev.mcp-gateway

  - name: durable-agent-only
    description: >
      Iterate on the durable-agent service with the Next.js UI.
      Starts: workflow-builder, durable-agent.
      Requires durable-agent Deployment in the cluster.
    patches:
      - op: remove
        path: dev.ai-chatbot
      - op: remove
        path: dev.ms-agent-workflow
      - op: remove
        path: dev.dapr-agent-runtime
      - op: remove
        path: dev.workflow-orchestrator
      - op: remove
        path: dev.function-router
      - op: remove
        path: dev.fn-activepieces
      - op: remove
        path: dev.fn-system
      - op: remove
        path: dev.mcp-gateway

  - name: compatibility-runtimes
    description: >
      Core OpenShell durable path plus the LangGraph-backed Dapr agent and
      the remaining compatibility backends.
      Starts: all deployed services except ai-chatbot and durable-agent
      (durable-agent has no Deployment in cluster yet).
    patches:
      - op: remove
        path: dev.ai-chatbot
      - op: remove
        path: dev.durable-agent

  - name: langgraph-agent-stack
    description: >
      Focused inner loop for the LangGraph-backed Dapr agent.
      Starts: workflow-builder, workflow-orchestrator, function-router, dapr-agent-runtime.
      Excludes ai-chatbot, ms-agent-workflow, durable-agent, fn-activepieces,
      fn-system, and mcp-gateway.
    patches:
      - op: remove
        path: dev.ai-chatbot
      - op: remove
        path: dev.ms-agent-workflow
      - op: remove
        path: dev.durable-agent
      - op: remove
        path: dev.fn-activepieces
      - op: remove
        path: dev.fn-system
      - op: remove
        path: dev.mcp-gateway

  - name: function-stack
    description: >
      Full function execution pipeline for testing action routing.
      Starts: workflow-builder, function-router, fn-activepieces, workflow-orchestrator.
      fn-system excluded (Knative scale-to-zero, dynamic deployment names).
    patches:
      - op: remove
        path: dev.ai-chatbot
      - op: remove
        path: dev.ms-agent-workflow
      - op: remove
        path: dev.dapr-agent-runtime
      - op: remove
        path: dev.durable-agent
      - op: remove
        path: dev.fn-system
      - op: remove
        path: dev.mcp-gateway

  - name: full-agent-stack
    description: >
      Every workflow-related service defined in this repo that has a Deployment in the cluster.
      Excludes durable-agent (no Deployment yet) and fn-system (Knative scale-to-zero).
    patches:
      - op: remove
        path: dev.durable-agent
      - op: remove
        path: dev.fn-system
