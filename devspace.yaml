# DevSpace Configuration for Workflow Builder
# Self-contained configuration for Kubernetes-native development with hot-reload
#
# Architecture:
#   - Replaces production container with devcontainer (full build tools)
#   - Syncs local files to container in real-time
#   - Runs Next.js dev server with hot module replacement
#   - Integrates with existing OTEL observability stack
#
# Usage:
#   bash scripts/devspace-dev-ryzen.sh  # Start the default durable OpenShell authoring loop
#   bash scripts/devspace-dev-ryzen.sh --profile langgraph-agent-stack  # Start the LangGraph Dapr agent loop with hot reload
#   bash scripts/devspace-dev-ryzen.sh --profile compatibility-runtimes  # Add langgraph dapr-agent-runtime + ms-agent-workflow
#   bash scripts/devspace-dev-ryzen.sh --profile workflow-ui-only  # Iterate on the Next.js app only
#   bash scripts/devspace-dev-ryzen.sh --profile durable-agent-only  # Iterate on durable-agent + Next.js UI
#   bash scripts/devspace-dev-ryzen.sh --profile full-agent-stack  # Start every in-repo workflow service
#   devspace dev       # Raw DevSpace entrypoint (does not pause ArgoCD)
#   devspace enter     # Shell into container
#   devspace purge     # Clean up devspace resources
#
# Notes:
#   - This repo can replace workflow-builder, workflow-orchestrator, function-router,
#     durable-agent, fn-activepieces, fn-system, mcp-gateway,
#     dapr-agent-runtime (LangGraph-backed Dapr agent), and ms-agent-workflow.
#   - openshell-agent-runtime is consumed as a deployed cluster service and is not
#     replaced by this DevSpace config because its source does not live in this repo.

version: v2beta1
name: workflow-builder

