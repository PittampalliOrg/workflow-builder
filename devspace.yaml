    description: >
      CNCF Serverless Workflow 1.0 development loop.
      Starts: workflow-builder (frontend types/nodes/config/store),
              workflow-orchestrator (SW 1.0 interpreter + sw_workflow_v1),
              function-router (call task routing via Dapr service invocation).
      Use this profile when iterating on the SW 1.0 migration: types, compile/decompile,
