# DevSpace Configuration for Workflow Builder
# Self-contained configuration for Kubernetes-native development with hot-reload
#
# Architecture:
#   - Replaces production container with devcontainer (full build tools)
#   - Syncs local files to container in real-time
#   - Runs SvelteKit dev server with hot module replacement
#   - Integrates with existing OTEL observability stack
#
# Usage:
#   bash scripts/devspace-dev-ryzen.sh  # Start the default observable OpenShell inner loop
#   bash scripts/devspace-dev-ryzen.sh --profile sw-workflow-dev  # CNCF Serverless Workflow 1.0 development
#   bash scripts/devspace-dev-ryzen.sh --profile openshell-observable-dev  # Explicit observable loop
#   bash scripts/devspace-dev-ryzen.sh --profile workflow-ui-only  # Iterate on the SvelteKit app only
#   bash scripts/devspace-dev-ryzen.sh --profile durable-agent-ui  # Iterate on workflow-builder Svelte app + durable-agent
#   bash scripts/devspace-dev-ryzen.sh --profile durable-agent-e2e  # workflow-builder + workflow-orchestrator + durable-agent
#   bash scripts/devspace-dev-ryzen.sh --profile durable-agent-only  # Backward-compatible alias for durable-agent-ui
#   bash scripts/devspace-dev-ryzen.sh --profile full-agent-stack  # Start every active in-repo workflow service
#   devspace run build-dev-base-images  # Refresh the Tekton-built base images used by durable-agent-ui
#   devspace dev       # Raw DevSpace entrypoint (pauses ArgoCD via pipeline)
#   devspace run deploy-ui      # Build + deploy SvelteKit image (no dev loop)
#   devspace run restart-ui     # Restart deployment with current image (no build)
#   devspace run-pipeline deploy-ui  # Pipeline: build + deploy (no dev loop)
#   devspace enter     # Shell into container
#   devspace purge     # Clean up devspace resources
#
# Notes:
#   - This repo can replace workflow-builder, workflow-orchestrator, function-router,
#     durable-agent, fn-activepieces, and mcp-gateway.
#   - openshell-agent-runtime is consumed as a deployed cluster service and is not
#     replaced by this DevSpace config because its source does not live in this repo.
#   - Use one profile at a time. If a session is already active, use `devspace enter`,
#     `devspace logs`, or `devspace purge` before switching profiles.

version: v2beta1
name: workflow-builder

# ============================================================================
# Variables
# ============================================================================
vars:
  # Application configuration
  APP_NAME: workflow-builder
  LOCAL_PORT: "3002"
  CONTAINER_PORT: "3000"
  SSH_PORT: 2223
  AI_CHATBOT_APP_NAME: ai-chatbot
  AI_CHATBOT_LOCAL_PORT: "3003"
  AI_CHATBOT_CONTAINER_PORT: "3000"
  AI_CHATBOT_SOURCE_PATH: "../../ai/main"
  AI_CHATBOT_PUBLIC_URL:
    default: "https://ai-chatbot-ryzen.tail286401.ts.net"
  ORCHESTRATOR_APP_NAME: workflow-orchestrator
  ORCHESTRATOR_LOCAL_PORT: "3013"
  ORCHESTRATOR_CONTAINER_PORT: "8080"
  FUNCTION_ROUTER_APP_NAME: function-router
  FUNCTION_ROUTER_LOCAL_PORT: "3014"
  FUNCTION_ROUTER_CONTAINER_PORT: "8080"
  DURABLE_AGENT_APP_NAME: durable-agent
  DURABLE_AGENT_LOCAL_PORT: "3015"
  DURABLE_AGENT_CONTAINER_PORT: "8001"
  FN_ACTIVEPIECES_APP_NAME: fn-activepieces
  FN_ACTIVEPIECES_LOCAL_PORT: "3016"
  FN_ACTIVEPIECES_CONTAINER_PORT: "8080"
  FN_SYSTEM_APP_NAME: fn-system
  FN_SYSTEM_LOCAL_PORT: "3017"
  FN_SYSTEM_CONTAINER_PORT: "8080"
  MCP_GATEWAY_APP_NAME: mcp-gateway
  MCP_GATEWAY_LOCAL_PORT: "3018"
  MCP_GATEWAY_CONTAINER_PORT: "8080"
  OPENSHELL_AGENT_RUNTIME_API_BASE_URL: "http://openshell-agent-runtime.openshell.svc.cluster.local:8083"

  # Registry configuration
  GITEA_HOST:
    default: "gitea.cnoe.localtest.me"
  GITEA_USER:
    default: "giteaadmin"

  # kind-ryzen ingress / auth callback URL
  APP_PUBLIC_URL:
    default: "https://workflow-builder-ryzen.tail286401.ts.net"

  # Resource configuration
  CPU_REQUEST:
    default: "500m"
  CPU_LIMIT:
    default: "4"
  MEMORY_REQUEST:
    default: "2Gi"
  MEMORY_LIMIT:
    default: "8Gi"

  # Observability
  OTEL_SERVICE_NAME:
    default: "${APP_NAME}-dev"
  OTEL_ENVIRONMENT:
    default: "development"

  # SvelteKit / pnpm configuration
  PNPM_VERSION:
    default: "9.12.3"

  # Database migrations
  RUN_MIGRATIONS:
    # Migrations are executed via GitOps (ArgoCD hook job) in this stack.
    default: "false"
  MIGRATION_COMMAND:
    default: "pnpm db:migrate"

  # Query currently deployed image tag from Kubernetes
  CURRENT_IMAGE_TAG:
    command: |
      kubectl get deployment ${APP_NAME} -n ${APP_NAME} -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null |
      sed 's/.*://' || echo "latest"
    default: "latest"

  CURRENT_PRODUCTION_IMAGE:
    command: |
      kubectl get deployment ${APP_NAME} -n ${APP_NAME} -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null ||
      echo "${GITEA_HOST}/${GITEA_USER}/${APP_NAME}:latest"
    default: "${GITEA_HOST}/${GITEA_USER}/${APP_NAME}:latest"

  CURRENT_IMAGE_REPOSITORY:
    command: |
      image="$(kubectl get deployment ${APP_NAME} -n ${APP_NAME} -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "${GITEA_HOST}/${GITEA_USER}/${APP_NAME}:latest")"
      printf '%s\n' "${image}" | sed 's#:[^/:]*$##'
    default: "${GITEA_HOST}/${GITEA_USER}/${APP_NAME}"
  TEKTON_WORKFLOW_BUILDER_DEV_IMAGE:
    command: |
      kubectl get taskrun -A -o json 2>/dev/null | jq -r '
        [
          .items[]
          | select(any(.status.conditions[]?; .type == "Succeeded" and .status == "True"))
          | {
              created: .metadata.creationTimestamp,
              image: (.status.results[]? | select(.name == "image_ref") | .value)
            }
          | select(.image != null and (.image | test("/workflow-builder:git-")))
        ]
        | sort_by(.created)
        | last.image // empty
      ' | sed 's#gitea.cnoe.localtest.me#gitea-ryzen.tail286401.ts.net#'
    default: "gitea-ryzen.tail286401.ts.net/giteaadmin/workflow-builder:git-75c7ecd71c29f884ab0848b0d2b3e8b5baca9cb5"

  DEV_IMAGE_REPOSITORY:
    default: "${GITEA_HOST}/${GITEA_USER}/nodejs-22-devspace"
  CURRENT_AI_CHATBOT_IMAGE_REPOSITORY:
    command: |
      image="$(kubectl get deployment ${AI_CHATBOT_APP_NAME} -n ${APP_NAME} -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "${GITEA_HOST}/${GITEA_USER}/${AI_CHATBOT_APP_NAME}:latest")"
      printf '%s\n' "${image}" | sed 's#:[^/:]*$##'
    default: "${GITEA_HOST}/${GITEA_USER}/${AI_CHATBOT_APP_NAME}"
  AI_CHATBOT_DEV_IMAGE_REPOSITORY:
    default: "${GITEA_HOST}/${GITEA_USER}/nodejs-22-devspace"
  CURRENT_ORCHESTRATOR_IMAGE_REPOSITORY:
    command: |
      image="$(kubectl get deployment ${ORCHESTRATOR_APP_NAME} -n ${APP_NAME} -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "${GITEA_HOST}/${GITEA_USER}/${ORCHESTRATOR_APP_NAME}:latest")"
      printf '%s\n' "${image}" | sed 's#:[^/:]*$##'
    default: "${GITEA_HOST}/${GITEA_USER}/${ORCHESTRATOR_APP_NAME}"
  ORCHESTRATOR_DEV_IMAGE_REPOSITORY:
    default: "${GITEA_HOST}/${GITEA_USER}/python-312-devspace"
  CURRENT_FUNCTION_ROUTER_IMAGE_REPOSITORY:
    command: |
      image="$(kubectl get deployment ${FUNCTION_ROUTER_APP_NAME} -n ${APP_NAME} -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "${GITEA_HOST}/${GITEA_USER}/${FUNCTION_ROUTER_APP_NAME}:latest")"
      printf '%s\n' "${image}" | sed 's#:[^/:]*$##'
    default: "${GITEA_HOST}/${GITEA_USER}/${FUNCTION_ROUTER_APP_NAME}"
  FUNCTION_ROUTER_DEV_IMAGE_REPOSITORY:
    default: "${GITEA_HOST}/${GITEA_USER}/nodejs-22-devspace"
  CURRENT_DURABLE_AGENT_IMAGE_REPOSITORY:
    command: |
      image="$(kubectl get deployment ${DURABLE_AGENT_APP_NAME} -n ${APP_NAME} -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "${GITEA_HOST}/${GITEA_USER}/${DURABLE_AGENT_APP_NAME}:latest")"
      printf '%s\n' "${image}" | sed 's#:[^/:]*$##'
    default: "${GITEA_HOST}/${GITEA_USER}/${DURABLE_AGENT_APP_NAME}"
  TEKTON_DURABLE_AGENT_DEV_IMAGE:
    command: |
      kubectl get taskrun -A -o json 2>/dev/null | jq -r '
        [
          .items[]
          | select(any(.status.conditions[]?; .type == "Succeeded" and .status == "True"))
          | {
              created: .metadata.creationTimestamp,
              image: (.status.results[]? | select(.name == "image_ref") | .value)
            }
          | select(.image != null and (.image | test("/opencode-durable-agent:git-")))
        ]
        | sort_by(.created)
        | last.image // empty
      ' | sed 's#gitea.cnoe.localtest.me#gitea-ryzen.tail286401.ts.net#'
    default: "gitea-ryzen.tail286401.ts.net/giteaadmin/opencode-durable-agent:git-235b13be1a4924333d7183094d6219bed7fe13d4"
  DURABLE_AGENT_DEV_IMAGE_REPOSITORY:
    default: "${GITEA_HOST}/${GITEA_USER}/nodejs-22-devspace"
  CURRENT_FN_ACTIVEPIECES_IMAGE_REPOSITORY:
    command: |
      image="$(kubectl get deployment ${FN_ACTIVEPIECES_APP_NAME} -n ${APP_NAME} -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "${GITEA_HOST}/${GITEA_USER}/${FN_ACTIVEPIECES_APP_NAME}:latest")"
      printf '%s\n' "${image}" | sed 's#:[^/:]*$##'
    default: "${GITEA_HOST}/${GITEA_USER}/${FN_ACTIVEPIECES_APP_NAME}"
  FN_ACTIVEPIECES_DEV_IMAGE_REPOSITORY:
    default: "${GITEA_HOST}/${GITEA_USER}/nodejs-22-devspace"
  CURRENT_FN_SYSTEM_IMAGE_REPOSITORY:
    command: |
      image="$(kubectl get deployment ${FN_SYSTEM_APP_NAME} -n ${APP_NAME} -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "${GITEA_HOST}/${GITEA_USER}/${FN_SYSTEM_APP_NAME}:latest")"
      printf '%s\n' "${image}" | sed 's#:[^/:]*$##'
    default: "${GITEA_HOST}/${GITEA_USER}/${FN_SYSTEM_APP_NAME}"
  FN_SYSTEM_DEV_IMAGE_REPOSITORY:
    default: "${GITEA_HOST}/${GITEA_USER}/nodejs-22-devspace"
  CURRENT_MCP_GATEWAY_IMAGE_REPOSITORY:
    command: |
      image="$(kubectl get deployment ${MCP_GATEWAY_APP_NAME} -n ${APP_NAME} -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "${GITEA_HOST}/${GITEA_USER}/${MCP_GATEWAY_APP_NAME}:latest")"
      printf '%s\n' "${image}" | sed 's#:[^/:]*$##'
    default: "${GITEA_HOST}/${GITEA_USER}/${MCP_GATEWAY_APP_NAME}"
  MCP_GATEWAY_DEV_IMAGE_REPOSITORY:
    default: "${GITEA_HOST}/${GITEA_USER}/nodejs-22-devspace"
  # ArgoCD apps to pause/resume during dev (space-separated, profile-patched)
  ARGO_APPS:
    default: "workflow-builder workflow-orchestrator function-router"
  # Production deployments to wait for on cleanup (space-separated, profile-patched)
  PRODUCTION_DEPLOYMENTS:
    default: "workflow-builder workflow-orchestrator function-router"

# ============================================================================
# Development Configuration
# ============================================================================
dev:
  app:
    # Target the deployment by stable workload labels
    namespace: ${APP_NAME}
    labelSelector:
      app: workflow-builder
      app.kubernetes.io/name: workflow-builder
    container: ${APP_NAME}

    # Use shared devcontainer (instead of per-app image)
    devImage: ${TEKTON_WORKFLOW_BUILDER_DEV_IMAGE}
    workingDir: /app

    # Resource requirements for development
    resources:
      requests:
        cpu: ${CPU_REQUEST}
        memory: ${MEMORY_REQUEST}
      limits:
        cpu: ${CPU_LIMIT}
        memory: ${MEMORY_LIMIT}

    # Command to run in the container
    command:
      - /bin/sh
      - -c
      - |
        set -e
        HASH_FILE="package.json"
        if [ -f "pnpm-lock.yaml" ]; then
          HASH_FILE="pnpm-lock.yaml"
        fi
        CURRENT_HASH="$(md5sum "$HASH_FILE" | cut -d' ' -f1)"
        echo "=== DevSpace Development Container (Workflow Builder) ==="
        echo "Replacing production image: ${CURRENT_PRODUCTION_IMAGE}"
        echo "Using shared devcontainer: nodejs-22-devspace"
        echo ""

        # Always enable corepack and pnpm (required even if node_modules cached)
        echo "Enabling corepack and pnpm..."
        corepack enable
        corepack prepare pnpm@${PNPM_VERSION} --activate

        echo "Checking dependencies..."
        if [ ! -d "node_modules" ] || [ ! -f "node_modules/.pnpm-lock-hash" ] || \
           [ "$(cat node_modules/.pnpm-lock-hash 2>/dev/null)" != "${CURRENT_HASH}" ]; then
          echo "Installing dependencies..."
          CI=1 pnpm install --no-frozen-lockfile --force
          printf '%s' "${CURRENT_HASH}" > node_modules/.pnpm-lock-hash
        else
          echo "Dependencies up to date (cached)"
        fi

        # Run database migrations (idempotent - only applies pending migrations)
        if [ "${RUN_MIGRATIONS}" = "true" ]; then
          echo "Running database migrations..."
          ${MIGRATION_COMMAND} || echo "Migrations skipped (database may not be ready)"
        fi

        # Add node_modules/.bin to PATH
        export PATH="/app/node_modules/.bin:$PATH"

        echo "Starting SvelteKit development server..."
        exec vite dev --host 0.0.0.0 --port ${CONTAINER_PORT}

    # File synchronization
    sync:
      - path: ./:/app
        initialSync: mirrorLocal
        disableDownload: true
        polling: true
        startContainer: true
        waitInitialSync: true
        onUpload:
          restartContainer: false
          exec:
            - name: install-dependencies
              command: sh
              args:
                - -lc
                - cd /app && corepack enable && corepack prepare pnpm@9.12.3 --activate && CI=1 pnpm install --no-frozen-lockfile --force
              failOnError: true
              onChange:
                - package.json
                - pnpm-lock.yaml
        excludePaths:
          # Node.js / SvelteKit artifacts
          - node_modules/
          - .pnpm-store/
          - .svelte-kit/
          - build/
          - dist/
          - coverage/
          # Dev tooling
          - .devenv/
          - .devspace/
          - .direnv/
          - .git
          - .git/
          - .github/
          - .idea/
          - .vscode/
          - .cursor/
          - .claude/
          # Test files
          - tests/
          - playwright-report/
          - test-results/
          - playwright.config.ts
          - vitest.config.ts
          # Docs & config
          - docs/
          - "*.md"
          - "*.log"
          - LICENSE
          - Dockerfile
          - Dockerfile.devspace
          - devenv.*
          - devenv.lock
          - .devenv*
          - .devenv.flake.nix
          - biome.jsonc
          - .dockerignore
          - .gitignore
          - .env.local
          - .env.example
          # Service subprojects (separate deployments)
          - services/

    # Patches to configure the pod for development
    patches:
      - op: remove
        path: spec.containers.name=${APP_NAME}.livenessProbe
      - op: remove
        path: spec.containers.name=${APP_NAME}.readinessProbe
      - op: replace
        path: spec.containers.name=${APP_NAME}.securityContext
        value:
          runAsUser: 0
          runAsGroup: 0
          runAsNonRoot: false
          allowPrivilegeEscalation: false
      - op: replace
        path: spec.securityContext
        value:
          fsGroup: 1001
          runAsNonRoot: false

    # Port forwarding for development
    ports:
      - port: "${LOCAL_PORT}:${CONTAINER_PORT}"

    # Keep dependencies hot across pod restarts and devspace purge/restart loops
    persistPaths:
      - path: /tmp
        skipPopulate: true
      - path: /app/node_modules
      - path: /app/.pnpm-store

    # SSH access for debugging
    ssh:
      enabled: true
      localPort: 2223

    # Environment variables for development
    env:
      - name: NODE_ENV
        value: development
      - name: npm_config_store_dir
        value: /app/.pnpm-store
      - name: DURABLE_EVENT_STREAM_PUBLISH_ENABLED
        value: "false"
      - name: DURABLE_LEGACY_COMPLETION_EVENTS_ENABLED
        value: "false"
      - name: OTEL_SERVICE_NAME
        value: ${OTEL_SERVICE_NAME}
      - name: OTEL_RESOURCE_ATTRIBUTES
        value: "deployment.environment=${OTEL_ENVIRONMENT},service.namespace=${APP_NAME}-dev,service.version=dev"
      - name: JAEGER_QUERY_SERVICE
        value: ${OTEL_SERVICE_NAME}
      - name: JAEGER_QUERY_URL
        value: "http://jaeger-query.observability.svc.cluster.local:16686"
      # Dapr sidecar configuration (for SDK access to config/secrets)
      - name: DAPR_HTTP_PORT
        value: "3500"
      - name: DAPR_GRPC_PORT
        value: "50001"
      - name: DAPR_SECRETS_STORE
        value: "azure-keyvault"
      - name: DAPR_CONFIG_STORE
        value: "azureappconfig-workflow-builder"
      - name: CONFIG_LABEL
        value: "workflow-builder"
      # Fallback URLs (Dapr SDK will override if available)
      - name: DAPR_ORCHESTRATOR_URL
        value: "http://workflow-orchestrator.workflow-builder.svc.cluster.local:8080"
      - name: GENERIC_ORCHESTRATOR_URL
        value: "http://workflow-orchestrator.workflow-builder.svc.cluster.local:8080"
      - name: WORKFLOW_ORCHESTRATOR_URL
        value: "http://workflow-orchestrator.workflow-builder.svc.cluster.local:8080"
      - name: FUNCTION_RUNNER_URL
        value: "http://function-router.workflow-builder.svc.cluster.local:8080"
      - name: CODE_PARSER_URL
        value: "http://code-parser.workflow-builder.svc.cluster.local:8080"
      - name: CODE_RUNTIME_URL
        value: "http://code-runtime.workflow-builder.svc.cluster.local:8080"
      - name: OPENSHELL_AGENT_RUNTIME_API_BASE_URL
        value: ${OPENSHELL_AGENT_RUNTIME_API_BASE_URL}
      - name: USE_DAPR_SERVICE_INVOCATION
        value: "true"
      - name: DAPR_WORKFLOW_ENABLED
        value: "true"
      - name: AUTH_TRUST_HOST
        value: "true"
      - name: WORKFLOW_BUILDER_DISABLE_NODE_OTEL
        value: "true"
      - name: MASTRA_AGENT_API_BASE_URL
        value: ""
      # Auth configuration for ingress access
      - name: APP_PUBLIC_URL
        value: ${APP_PUBLIC_URL}
      - name: BETTER_AUTH_URL
        value: ${APP_PUBLIC_URL}
      # Public client IDs (SvelteKit PUBLIC_ prefix for client-side access)
      - name: PUBLIC_GITHUB_CLIENT_ID
        value: "Ov23lixcpFfGjGtsNCxC"
      - name: PUBLIC_GOOGLE_CLIENT_ID
        value: "875421392000-2u0qcvoa6sc2vpisl0v8ah5h4drrljvr.apps.googleusercontent.com"
      # fn-activepieces internal URL (dev override for dynamic dropdown options)
      - name: FN_ACTIVEPIECES_URL
        value: "http://fn-activepieces.workflow-builder.svc.cluster.local"
      # AP_ENCRYPTION_KEY is provided by envFrom secretRef: workflow-builder-secrets
      # Do NOT override it here — DevSpace inherits the base deployment's envFrom

    # DevSpace attaches to the existing Argo-managed deployment, so the pod
    # keeps its base Dapr annotations and sidecar configuration. Use the
    # ryzen wrapper script to pause ArgoCD reconcile for the session.
  ai-chatbot:
    namespace: ${APP_NAME}
    labelSelector:
      app: ai-chatbot
      app.kubernetes.io/name: ai-chatbot
    container: ${AI_CHATBOT_APP_NAME}
    devImage: ${AI_CHATBOT_DEV_IMAGE_REPOSITORY}:latest
    workingDir: /app
    resources:
      requests:
        cpu: ${CPU_REQUEST}
        memory: ${MEMORY_REQUEST}
      limits:
        cpu: ${CPU_LIMIT}
        memory: ${MEMORY_LIMIT}
    command:
      - /bin/sh
      - -c
      - |
        set -e
        echo "=== DevSpace Development Container (AI Chatbot) ==="
        echo "Using source tree: ${AI_CHATBOT_SOURCE_PATH}"

        # Install Claude Code CLI globally (for Claude Code provider)
        echo "Installing Claude Code CLI..."
        npm install -g @anthropic-ai/claude-code --prefix /usr/local 2>/dev/null || echo "Claude CLI already installed"

        corepack enable
        corepack prepare pnpm@${PNPM_VERSION} --activate

        echo "Checking dependencies..."
        if [ ! -d "node_modules" ] || [ ! -f "node_modules/.pnpm-lock-hash" ] || \
           [ "$(cat node_modules/.pnpm-lock-hash 2>/dev/null)" != "$(md5sum pnpm-lock.yaml | cut -d' ' -f1)" ]; then
          echo "Installing dependencies..."
          pnpm install --no-frozen-lockfile
          md5sum pnpm-lock.yaml | cut -d' ' -f1 > node_modules/.pnpm-lock-hash
        else
          echo "Dependencies up to date (cached)"
        fi

        echo "Running database migrations..."
        pnpm tsx lib/db/migrate || echo "Migrations skipped (database may not be ready)"

        exec pnpm dev --hostname 0.0.0.0 --port ${AI_CHATBOT_CONTAINER_PORT}
    sync:
      - path: ${AI_CHATBOT_SOURCE_PATH}/:/app
        initialSync: mirrorLocal
        disableDownload: true
        polling: true
        startContainer: true
        waitInitialSync: true
        onUpload:
          restartContainer: false
          exec:
            - name: install-ai-chatbot-deps
              command: sh
              args:
                - -lc
                - cd /app && corepack enable && corepack prepare pnpm@9.12.3 --activate && pnpm install --no-frozen-lockfile
              failOnError: true
              onChange:
                - package.json
                - pnpm-lock.yaml
        excludePaths:
          - node_modules/
          - .pnpm-store/
          - .next/
          - dist/
          - out/
          - coverage/
          - next-env.d.ts
          - .devenv/
          - .devspace/
          - .direnv/
          - .git
          - .git/
          - .github/
          - .idea/
          - .vscode/
          - .cursor/
          - .claude/
          - tests/
          - playwright-report/
          - test-results/
          - playwright.config.ts
          - vitest.config.ts
          - docs/
          - "*.md"
          - "*.log"
          - LICENSE
          - Dockerfile
          - Dockerfile.devspace
          - devenv.*
          - devenv.lock
          - .devenv*
          - .devenv.flake.nix
          - biome.jsonc
          - .dockerignore
          - .gitignore
          - .env.local
          - .env.example
          - cookies.txt
    persistPaths:
      - path: /tmp
        skipPopulate: true
      - path: /app/node_modules
    patches:
      - op: remove
        path: spec.initContainers.name=db-migrate
      - op: remove
        path: spec.containers.name=${AI_CHATBOT_APP_NAME}.livenessProbe
      - op: remove
        path: spec.containers.name=${AI_CHATBOT_APP_NAME}.readinessProbe
      - op: remove
        path: spec.containers.name=${AI_CHATBOT_APP_NAME}.startupProbe
      - op: replace
        path: spec.containers.name=${AI_CHATBOT_APP_NAME}.envFrom
        value: []
      - op: replace
        path: spec.containers.name=${AI_CHATBOT_APP_NAME}.securityContext
        value:
          runAsUser: 0
          runAsGroup: 0
          runAsNonRoot: false
          allowPrivilegeEscalation: false
      - op: replace
        path: spec.securityContext
        value:
          fsGroup: 1001
          runAsNonRoot: false
    ports:
      - port: "${AI_CHATBOT_LOCAL_PORT}:${AI_CHATBOT_CONTAINER_PORT}"
    env:
