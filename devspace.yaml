      - op: remove
        path: dev.fn-activepieces
      - op: remove
        path: dev.mcp-gateway
      - op: remove
        path: dev.swebench-coordinator
      - op: remove
        path: dev.dapr-agent-py

  - name: swebench-dev
    description: >
      SWE-bench benchmark execution loop.
      Starts: workflow-builder (benchmark API + run state), workflow-orchestrator
              and function-router (agent inference workflow), and swebench-coordinator
              (parent/child SWE-bench workflows and evaluator Job creation).
              Also replaces dapr-agent-py so local agent telemetry changes can be
              validated against the same ryzen MLflow trace experiment.
      The evaluator itself is a Kubernetes Job image; use
      `devspace run build-swebench-evaluator-dev-image` when iterating on that image,
      then override SWEBENCH_EVALUATOR_IMAGE if the coordinator should launch the dev tag.
    patches:
      - op: replace
        path: vars.ARGO_APPS.default
        value: "workflow-builder workflow-orchestrator function-router swebench-coordinator dapr-agent-py"
      - op: replace
        path: vars.PRODUCTION_DEPLOYMENTS.default
        value: "workflow-builder workflow-orchestrator function-router swebench-coordinator dapr-agent-py"
      - op: remove
        path: dev.ai-chatbot
      - op: remove
        path: dev.fn-activepieces
      - op: remove
        path: dev.mcp-gateway

  - name: full-agent-stack
    description: >
      Every active in-repo workflow service.
    patches:
      - op: replace
        path: vars.ARGO_APPS.default
        value: "workflow-builder ai-chatbot workflow-orchestrator function-router fn-activepieces mcp-gateway swebench-coordinator dapr-agent-py"
      - op: replace
        path: vars.PRODUCTION_DEPLOYMENTS.default
        value: "workflow-builder ai-chatbot workflow-orchestrator function-router fn-activepieces mcp-gateway swebench-coordinator dapr-agent-py"
