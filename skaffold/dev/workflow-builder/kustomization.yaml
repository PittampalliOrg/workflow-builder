apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Narrow scope: only the workflow-builder Deployment.
#
# Why not extend the whole prod kustomization folder: the ArgoCD Application
# applies inline kustomize patches (e.g. per-cluster ExternalSecret remoteRef
# rewrites) which our local Skaffold render can't see. Re-deploying the full
# folder via Skaffold would either
# clobber Argo's render (image-pull errors for postgres, pgbouncer, etc.) or
# require us to mirror every Application-level patch here.
#
# Instead, deploy only the patched Deployment over the live, Argo-managed
# pod. All other resources (Services, ConfigMaps, ExternalSecrets, Dapr
# Components, Subscriptions, init-container postgres image, ...) stay as
# Argo deployed them — Skaffold's kubectl apply doesn't see them.
#
# kustomize build requires --load-restrictor=LoadRestrictionsNone for the
# parent-directory reference — skaffold/workflow-builder.skaffold.yaml passes
# the flag via manifests.kustomize.buildArgs.

namespace: workflow-builder

resources:
  - ../../../../../stacks/main/packages/components/workloads/workflow-builder/manifests/Deployment-workflow-builder.yaml

# No postgres image rewrite needed: the init container
# `wait-for-execution-read-model` uses bare `docker.io/library/postgres:15.3-alpine3.18`,
# which ryzen pulls directly via the authenticated containerd hosts.toml
# (deployment/config/containerd/docker.io) + Spegel P2P. The former
# gitea.cnoe.localtest.me mirror — and the ArgoCD App-level rewrite this used
# to mirror — were retired with Gitea.

# Strategic-merge patch: swap image to `workflow-builder-dev` (Skaffold then
# rewrites to its built tag+digest), NODE_ENV→development, container
# securityContext (so root can run pnpm install), and dev-only env vars.
patches:
  - target:
      kind: Deployment
      name: workflow-builder
    path: deployment-dev-patch.yaml
