apiVersion: apps/v1
kind: Deployment
metadata:
  name: fn-activepieces
  namespace: workflow-builder
  annotations:
    skaffold.dev/managed: "true"
spec:
  replicas: 1
  template:
    metadata:
      annotations:
        skaffold.dev/managed: "true"
    spec:
      containers:
        - name: fn-activepieces
          image: fn-activepieces-dev
          imagePullPolicy: Always
          env:
            - name: NODE_ENV
              value: development
            - name: OTEL_SERVICE_NAME
              value: fn-activepieces-dev
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: false
      securityContext:
        fsGroup: 1001
        runAsNonRoot: false
