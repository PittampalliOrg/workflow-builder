apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Narrow scope: only the workflow-orchestrator Deployment. See
# skaffold/dev/workflow-builder/kustomization.yaml for the rationale.

namespace: workflow-builder

resources:
  - ../../../../../stacks/main/packages/components/active-development/manifests/workflow-orchestrator/Deployment-workflow-orchestrator.yaml

# Mirror the Application-level postgres image rewrite for the init container.
images:
  - name: docker.io/library/postgres
    newName: gitea.cnoe.localtest.me:8443/giteaadmin/postgres
    newTag: 15.3-alpine3.18

patches:
  - target:
      kind: Deployment
      name: workflow-orchestrator
    path: deployment-dev-patch.yaml
