apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Narrow scope: only the workflow-orchestrator Deployment. See
# skaffold/dev/workflow-builder/kustomization.yaml for the rationale.

namespace: workflow-builder

resources:
  - ../../../../../stacks/main/packages/components/workloads/workflow-orchestrator/manifests/Deployment-workflow-orchestrator.yaml

# No postgres image rewrite needed — ryzen pulls bare
# docker.io/library/postgres directly via the authenticated containerd
# hosts.toml. See skaffold/dev/workflow-builder/kustomization.yaml for the
# rationale (the gitea.cnoe.localtest.me mirror was retired with Gitea).

patches:
  - target:
      kind: Deployment
      name: workflow-orchestrator
    path: deployment-dev-patch.yaml
