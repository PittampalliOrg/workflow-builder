apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: workflow-builder

# Inner loop (`skaffold dev`):
#   Build a thin dev image (node:22-alpine + pnpm install baked from
#   package.json/pnpm-lock.yaml), render the dev kustomize overlay (which
#   extends the prod manifest folder in stacks/main/, so every Dapr Component,
#   ExternalSecret, Service, ConfigMap, init container, etc. comes along
#   unchanged), deploy via kubectl, then watch src/ and friends for changes —
#   Skaffold syncs matched paths into the running pod via tar; Vite's
#   filesystem watcher picks them up and HMR pushes to the browser.
#
#   ArgoCD pause is wired both ways:
#     - `deploy.kubectl.hooks.before` runs argo-pause.sh on every deploy
#       iteration (idempotent), so a direct `skaffold dev` is safe.
#     - `scripts/skaffold-dev.sh` additionally traps SIGINT/SIGTERM/EXIT and
#       calls hooks/argo-resume.sh — Skaffold has no "session exit" hook that
#       fires on kill -9, so the wrapper remains the canonical entry point
#       for trap-based resume + UX (port-forward banner, stale-pause detector,
#       post-session summary).
#
# Outer loop (`skaffold run` / `skaffold build`, see `run` profile below):
#   Build the production multi-stage Dockerfile at repo root, push to
#   gitea-ryzen, then a build-artifact `after` hook writes the new newTag into
#   stacks/main/.../workloads/workflow-builder/manifests/kustomization.yaml
#   and git-pushes. ArgoCD (automated.selfHeal=true) reconciles within ~30s.

build:
  local:
    useBuildkit: true
    useDockerCLI: true
    push: true
  tagPolicy:
    # `inputDigest` is the natural fit (content-addressable, no cache misses),
    # but Skaffold v2.17 has an open issue where its build-context tar walker
    # mis-parses repos with allowlist-style .dockerignore (the COPY argument
    # validation fails before docker even sees the context). Use `gitCommit`
    # for the dev image — Skaffold still cache-keys on file hashes for sync.
    gitCommit:
      variant: AbbrevCommitSha
      ignoreChanges: true   # uncommitted dev edits don't bust the cache
  artifacts:
    - image: workflow-builder-dev
      # Paths in this module yaml are relative to the file (skaffold/). The
      # build context is the repo root (workflow-builder/main), so we walk
      # up one level. Dockerfile path is then relative to the context.
      context: ..
      docker:
        dockerfile: skaffold/dev/workflow-builder/Dockerfile.dev
        buildArgs:
          PNPM_VERSION: "9.12.3"
      sync:
        manual:
          # Source paths — fast HMR (no rebuild). Files NOT listed here
          # (package.json, pnpm-lock.yaml, Dockerfile.dev, .npmrc) trigger a
          # full rebuild + redeploy when changed.
          - src: "src/**/*"
            dest: /app
          - src: "static/**/*"
            dest: /app
          - src: "drizzle/**/*"
            dest: /app
          - src: "lib/**/*"
            dest: /app
          - src: "scripts/**/*.ts"
            dest: /app
          - src: "scripts/**/*.js"
            dest: /app
          - src: "scripts/**/*.mjs"
            dest: /app
          - src: "scripts/fixtures/**/*"
            dest: /app
          - src: "vite.config.ts"
            dest: /app
          - src: "svelte.config.js"
            dest: /app
          - src: "tsconfig.json"
            dest: /app
          - src: "components.json"
            dest: /app
          - src: "drizzle.config.ts"
            dest: /app
          - src: "server-prod.js"
            dest: /app

manifests:
  kustomize:
    paths:
      # Relative to this module file (skaffold/) → skaffold/dev/workflow-builder.
      - dev/workflow-builder
    buildArgs:
      # The dev overlay's `resources:` references
      # ../../../../../stacks/main/... — kustomize's default load restrictor
      # forbids parent-directory references.
      - --load-restrictor=LoadRestrictionsNone

deploy:
  kubectl:
    defaultNamespace: workflow-builder
    # Idempotent host hook so a direct `skaffold dev` (no wrapper) still pauses
    # ArgoCD for this module on the first deploy. Wrapper scripts/skaffold-dev.sh
    # still owns trap-based resume on exit — Skaffold has no "session exit" hook
    # that survives kill -9, so the wrapper remains the canonical entry point.
    # The run profile clears `kubectl: {}` and so suppresses these hooks.
    hooks:
      before:
        - host:
            command: ["bash", "skaffold/hooks/argo-pause.sh", "workflow-builder"]
            os: [linux, darwin]

portForward:
  - resourceType: deployment
    resourceName: workflow-builder
    namespace: workflow-builder
    port: 3000
    localPort: 3002

# Post-deploy verification — runs after each `skaffold dev` deploy iteration and
# on `skaffold verify`. Probe targets the live in-cluster Service so it catches
# real reachability issues, not just pod-status. Suppressed in the `run` profile
# (no deploy → nothing to verify).
verify:
  - name: workflow-builder-ready
    container:
      name: probe
      image: curlimages/curl:8.10.1
      command: ["sh", "-c"]
      args:
        - |
          set -e
          url=http://workflow-builder.workflow-builder.svc.cluster.local:3000/
          for i in $(seq 1 10); do
            if curl -fsS --max-time 5 "$url" -o /dev/null; then
              echo "verify: workflow-builder reachable at $url (attempt $i)"
              exit 0
            fi
            sleep 3
          done
          echo "verify: workflow-builder NOT reachable at $url after 10 attempts" >&2
          exit 1
    executionMode:
      kubernetesCluster: {}

profiles:
  - name: run
    # Auto-activate on `skaffold run` / `skaffold build` — no `-p run` needed.
    activation:
      - command: run
      - command: build
    build:
      local:
        useBuildkit: true
        useDockerCLI: true
        push: true
      tagPolicy:
        customTemplate:
          # Matches the existing git-<sha> tag scheme in the stacks repo.
          template: "git-{{.GIT_COMMIT}}"
          components:
            - name: GIT_COMMIT
              gitCommit:
                variant: CommitSha
      artifacts:
        - image: ghcr.io/pittampalliorg/workflow-builder
          # Same context jump as the dev artifact above — repo root, not the
          # module file dir.
          context: ..
          docker:
            dockerfile: Dockerfile
          # No sync — prod image, full rebuild on every change.
          # NOTE: don't add `hooks.after` here — Skaffold skips artifact hooks
          # on cache hits, so we'd silently miss commit-pin when re-running
          # with the same source. The wrapper `scripts/skaffold-deploy.sh`
          # parses `skaffold build --file-output` and unconditionally invokes
          # `skaffold/hooks/commit-pin.sh` instead. Prefer that wrapper over
          # direct `skaffold run` / `skaffold build` for the outer loop.
    # Do not render or deploy in `run` mode — the kustomize pin commit + Argo
    # selfHeal handle the rollout. `kubectl: {}` also clears the top-level
    # deploy.hooks (no ArgoCD pause during outer-loop builds).
    manifests:
      rawYaml: []
    deploy:
      kubectl: {}
    # No deploy → nothing to verify.
    verify: []
