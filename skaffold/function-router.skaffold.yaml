apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: function-router

# Node/Express service. See skaffold/workflow-builder.skaffold.yaml for the
# inner-loop/outer-loop pattern; this module mirrors it.

build:
  local:
    useBuildkit: true
    useDockerCLI: true
    push: true
  tagPolicy:
    gitCommit:
      variant: AbbrevCommitSha
      ignoreChanges: true
  artifacts:
    - image: function-router-dev
      context: ..
      docker:
        dockerfile: skaffold/dev/function-router/Dockerfile.dev
        buildArgs:
          PNPM_VERSION: "9.12.3"
      sync:
        manual:
          - src: "services/function-router/src/**/*"
            dest: /app
            strip: services/function-router/
          - src: "services/function-router/config/**/*"
            dest: /app
            strip: services/function-router/
          - src: "services/function-router/tsconfig.json"
            dest: /app
            strip: services/function-router/

manifests:
  kustomize:
    paths:
      - dev/function-router
    buildArgs:
      - --load-restrictor=LoadRestrictionsNone

deploy:
  kubectl:
    defaultNamespace: workflow-builder
    hooks:
      before:
        - host:
            command: ["bash", "skaffold/hooks/argo-pause.sh", "function-router"]
            os: [linux, darwin]

portForward:
  - resourceType: deployment
    resourceName: function-router
    namespace: workflow-builder
    port: 8080
    localPort: 3014

verify:
  - name: function-router-ready
    container:
      name: probe
      image: curlimages/curl:8.10.1
      command: ["sh", "-c"]
      args:
        - |
          set -e
          url=http://function-router.workflow-builder.svc.cluster.local:8080/readyz
          for i in $(seq 1 10); do
            if curl -fsS --max-time 5 "$url" -o /dev/null; then
              echo "verify: function-router reachable at $url (attempt $i)"
              exit 0
            fi
            sleep 3
          done
          echo "verify: function-router NOT reachable at $url after 10 attempts" >&2
          exit 1
    executionMode:
      kubernetesCluster: {}

profiles:
  - name: run
    activation:
      - command: run
      - command: build
    build:
      local:
        useBuildkit: true
        useDockerCLI: true
        push: true
      tagPolicy:
        customTemplate:
          template: "git-{{.GIT_COMMIT}}"
          components:
            - name: GIT_COMMIT
              gitCommit:
                variant: CommitSha
      artifacts:
        - image: ghcr.io/pittampalliorg/function-router
          context: ..
          docker:
            dockerfile: services/function-router/Dockerfile
    manifests:
      rawYaml: []
    deploy:
      kubectl: {}
    verify: []
