apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: workflow-orchestrator

# Python/FastAPI/Dapr Workflow orchestrator. See
# skaffold/workflow-builder.skaffold.yaml for the inner-loop/outer-loop
# pattern; this module mirrors it.

build:
  local:
    useBuildkit: true
    useDockerCLI: true
    push: true
  tagPolicy:
    gitCommit:
      variant: AbbrevCommitSha
      ignoreChanges: true
  artifacts:
    - image: workflow-orchestrator-dev
      # Build context is the repo root so Dockerfile.dev can COPY from
      # services/workflow-orchestrator/.
      context: ..
      docker:
        dockerfile: skaffold/dev/workflow-orchestrator/Dockerfile.dev
      sync:
        manual:
          - src: "services/workflow-orchestrator/**/*.py"
            dest: /app
            strip: services/workflow-orchestrator/
          - src: "services/workflow-orchestrator/**/*.toml"
            dest: /app
            strip: services/workflow-orchestrator/
          - src: "services/workflow-orchestrator/**/*.json"
            dest: /app
            strip: services/workflow-orchestrator/
          - src: "services/workflow-orchestrator/**/*.yaml"
            dest: /app
            strip: services/workflow-orchestrator/

manifests:
  kustomize:
    paths:
      - dev/workflow-orchestrator
    buildArgs:
      - --load-restrictor=LoadRestrictionsNone

deploy:
  kubectl:
    defaultNamespace: workflow-builder
    # See workflow-builder.skaffold.yaml for the wrapper-vs-hook rationale. The
    # run profile clears `kubectl: {}` and so suppresses this hook.
    hooks:
      before:
        - host:
            command: ["bash", "skaffold/hooks/argo-pause.sh", "workflow-orchestrator"]
            os: [linux, darwin]

portForward:
  - resourceType: deployment
    resourceName: workflow-orchestrator
    namespace: workflow-builder
    port: 8080
    localPort: 3013

verify:
  - name: workflow-orchestrator-ready
    container:
      name: probe
      image: curlimages/curl:8.10.1
      command: ["sh", "-c"]
      args:
        - |
          set -e
          url=http://workflow-orchestrator.workflow-builder.svc.cluster.local:8080/readyz
          for i in $(seq 1 10); do
            if curl -fsS --max-time 5 "$url" -o /dev/null; then
              echo "verify: workflow-orchestrator reachable at $url (attempt $i)"
              exit 0
            fi
            sleep 3
          done
          echo "verify: workflow-orchestrator NOT reachable at $url after 10 attempts" >&2
          exit 1
    executionMode:
      kubernetesCluster: {}

profiles:
  - name: run
    activation:
      - command: run
      - command: build
    build:
      local:
        useBuildkit: true
        useDockerCLI: true
        push: true
      tagPolicy:
        customTemplate:
          template: "git-{{.GIT_COMMIT}}"
          components:
            - name: GIT_COMMIT
              gitCommit:
                variant: CommitSha
      artifacts:
        - image: gitea-ryzen.tail286401.ts.net/giteaadmin/workflow-orchestrator
          context: ../services/workflow-orchestrator
          docker:
            dockerfile: Dockerfile
    manifests:
      rawYaml: []
    deploy:
      kubectl: {}
    verify: []
