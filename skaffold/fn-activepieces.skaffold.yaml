apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: fn-activepieces

# Node/Express service. See skaffold/workflow-builder.skaffold.yaml for the
# inner-loop/outer-loop pattern; this module mirrors it.

build:
  local:
    useBuildkit: true
    useDockerCLI: true
    push: true
  tagPolicy:
    gitCommit:
      variant: AbbrevCommitSha
      ignoreChanges: true
  artifacts:
    - image: fn-activepieces-dev
      context: ..
      docker:
        dockerfile: skaffold/dev/fn-activepieces/Dockerfile.dev
        buildArgs:
          PNPM_VERSION: "9.12.3"
      sync:
        manual:
          - src: "services/fn-activepieces/src/**/*"
            dest: /app
            strip: services/fn-activepieces/
          - src: "services/fn-activepieces/config/**/*"
            dest: /app
            strip: services/fn-activepieces/
          - src: "services/fn-activepieces/tsconfig.json"
            dest: /app
            strip: services/fn-activepieces/

manifests:
  kustomize:
    paths:
      - dev/fn-activepieces
    buildArgs:
      - --load-restrictor=LoadRestrictionsNone

deploy:
  kubectl:
    defaultNamespace: workflow-builder

portForward:
  - resourceType: deployment
    resourceName: fn-activepieces
    namespace: workflow-builder
    port: 8080
    localPort: 3016

profiles:
  - name: run
    activation:
      - command: run
      - command: build
    build:
      local:
        useBuildkit: true
        useDockerCLI: true
        push: true
      tagPolicy:
        customTemplate:
          template: "git-{{.GIT_COMMIT}}"
          components:
            - name: GIT_COMMIT
              gitCommit:
                variant: CommitSha
      artifacts:
        - image: ghcr.io/pittampalliorg/fn-activepieces
          context: ..
          docker:
            dockerfile: services/fn-activepieces/Dockerfile
    manifests:
      rawYaml: []
    deploy:
      kubectl: {}
