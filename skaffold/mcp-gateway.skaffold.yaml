apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: mcp-gateway

# Node/Express service. See skaffold/workflow-builder.skaffold.yaml for the
# inner-loop/outer-loop pattern; this module mirrors it.

build:
  local:
    useBuildkit: true
    useDockerCLI: true
    push: true
  tagPolicy:
    gitCommit:
      variant: AbbrevCommitSha
      ignoreChanges: true
  artifacts:
    - image: mcp-gateway-dev
      context: ..
      docker:
        dockerfile: skaffold/dev/mcp-gateway/Dockerfile.dev
        buildArgs:
          PNPM_VERSION: "9.12.3"
      sync:
        manual:
          - src: "services/mcp-gateway/src/**/*"
            dest: /app
            strip: services/mcp-gateway/
          - src: "services/mcp-gateway/config/**/*"
            dest: /app
            strip: services/mcp-gateway/
          - src: "services/mcp-gateway/tsconfig.json"
            dest: /app
            strip: services/mcp-gateway/

manifests:
  kustomize:
    paths:
      - dev/mcp-gateway
    buildArgs:
      - --load-restrictor=LoadRestrictionsNone

deploy:
  kubectl:
    defaultNamespace: workflow-builder
    hooks:
      before:
        - host:
            command: ["bash", "skaffold/hooks/argo-pause.sh", "mcp-gateway"]
            os: [linux, darwin]

portForward:
  - resourceType: deployment
    resourceName: mcp-gateway
    namespace: workflow-builder
    port: 8080
    localPort: 3018

verify:
  - name: mcp-gateway-ready
    container:
      name: probe
      image: curlimages/curl:8.10.1
      command: ["sh", "-c"]
      args:
        - |
          set -e
          url=http://mcp-gateway.workflow-builder.svc.cluster.local:8080/health
          for i in $(seq 1 10); do
            if curl -fsS --max-time 5 "$url" -o /dev/null; then
              echo "verify: mcp-gateway reachable at $url (attempt $i)"
              exit 0
            fi
            sleep 3
          done
          echo "verify: mcp-gateway NOT reachable at $url after 10 attempts" >&2
          exit 1
    executionMode:
      kubernetesCluster: {}

profiles:
  - name: run
    activation:
      - command: run
      - command: build
    build:
      local:
        useBuildkit: true
        useDockerCLI: true
        push: true
      tagPolicy:
        customTemplate:
          template: "git-{{.GIT_COMMIT}}"
          components:
            - name: GIT_COMMIT
              gitCommit:
                variant: CommitSha
      artifacts:
        - image: ghcr.io/pittampalliorg/mcp-gateway
          context: ..
          docker:
            dockerfile: services/mcp-gateway/Dockerfile
    manifests:
      rawYaml: []
    deploy:
      kubectl: {}
    verify: []
