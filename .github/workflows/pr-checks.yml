name: PR Checks

on:
  pull_request:
    branches: ['*']
  # Skaffold commit-pin / outer-loop flows land commits directly on main,
  # so PR-only gating would leave main unguarded.
  push:
    branches: ['main']

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Detect whether the BUILD-CONFIG surface changed. `pnpm build` is a
      # smoke build only (Tekton builds the authoritative image on merge), and
      # the failure classes ONLY a vite build catches are config-shaped:
      # vite/svelte config, dependency graph, Dockerfile, CSS entry, hooks,
      # app shell. Everything else is already covered by svelte-check + unit
      # tests, so ordinary src changes skip the ~3min build.
      - name: Detect build-config changes
        id: build_surface
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            build:
              - 'package.json'
              - 'pnpm-lock.yaml'
              - '.npmrc'
              - 'vite.config.*'
              - 'svelte.config.*'
              - 'Dockerfile'
              - 'src/app.html'
              - 'src/app.css'
              - 'src/hooks.*'
              - '.github/workflows/pr-checks.yml'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate plugin registry
        run: pnpm discover-plugins

      # NOTE: `pnpm check` already runs svelte-check (which IS the type check —
      # the package.json `type-check` script is the identical invocation, kept
      # for local use). Running it twice here cost ~3min per CI run.
      - name: Run check
        run: pnpm check

      - name: Run import-boundary check
        run: pnpm check:boundaries:ratchet

      - name: Validate preview governance gate
        run: node --test scripts/architecture/check-dependency-boundaries.node-test.mjs scripts/governance/preview-gate.node-test.mjs

      - name: Run dev-sync transport tests
        run: pnpm test:dev-sync

      - name: Run unit tests
        run: pnpm test:unit --run

      # Pre-merge smoke build, PATH-GATED: only when the build-config surface
      # changed (see build_surface above). On pushes to main the Tekton
      # outer-loop builds the same commit authoritatively (inside the
      # Dockerfile), so a second build here adds nothing — tests/boundaries
      # above still run.
      - name: Run build
        run: pnpm build
        env:
          # Match the authoritative Docker build: adapter-node exceeds V8's
          # default ~4 GiB heap for the current server bundle.
          NODE_OPTIONS: --max-old-space-size=8192
        if: github.event_name == 'pull_request' && steps.build_surface.outputs.build == 'true'

  orchestrator-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: services/workflow-orchestrator/uv.lock

      - name: Run orchestrator tests
        working-directory: services/workflow-orchestrator
        run: uv run pytest tests/ -q
