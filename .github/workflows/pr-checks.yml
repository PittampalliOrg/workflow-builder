name: PR Checks

on:
  pull_request:
    branches: ['*']
  # Skaffold commit-pin / outer-loop flows land commits directly on main,
  # so PR-only gating would leave main unguarded.
  push:
    branches: ['main']

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate plugin registry
        run: pnpm discover-plugins

      - name: Run check
        run: pnpm check

      - name: Run type check
        run: pnpm type-check

      - name: Run import-boundary check
        run: pnpm check:boundaries:ratchet

      - name: Validate preview governance gate
        run: node --test scripts/architecture/check-dependency-boundaries.node-test.mjs scripts/governance/preview-gate.node-test.mjs

      - name: Run unit tests
        run: pnpm test:unit --run

      # Pre-merge smoke build only: on pushes to main the Tekton outer-loop
      # builds the same commit authoritatively (inside the Dockerfile), so a
      # second build here adds nothing — tests/boundaries above still run.
      - name: Run build
        run: pnpm build
        if: github.event_name == 'pull_request'

  orchestrator-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: services/workflow-orchestrator/uv.lock

      - name: Run orchestrator tests
        working-directory: services/workflow-orchestrator
        run: uv run pytest tests/ -q
